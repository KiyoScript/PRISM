<!DOCTYPE html>
<html lang="en" style="color-scheme:light;">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PRISM — Roll Inventory</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
  <style>
    /* ═══════════════════════════════════════════
       PRISM DESIGN SYSTEM  — v4.0
       Brand: deep forest green + teal accent
       Font: DM Sans + JetBrains Mono (for IDs)
    ═══════════════════════════════════════════ */
    :root {
      --p-bg:        #f0f4f2;
      --p-surface:   #ffffff;
      --p-border:    #e2e8e4;
      --p-text:      #111c17;
      --p-muted:     #5c7268;
      --p-faint:     #9db5ae;

      --p-green:     #15803d;
      --p-green-lt:  #f0fdf4;
      --p-green-bd:  #86efac;
      --p-teal:      #0d9488;
      --p-teal-lt:   #f0fdfa;
      --p-teal-bd:   #5eead4;

      --p-amber:     #ca8a04;
      --p-amber-lt:  #fefce8;
      --p-amber-bd:  #fde68a;
      --p-red:       #dc2626;
      --p-red-lt:    #fef2f2;
      --p-red-bd:    #fecaca;
      --p-indigo:    #4f46e5;
      --p-indigo-lt: #eef2ff;
      --p-purple:    #7c3aed;
      --p-purple-lt: #faf5ff;
      --p-purple-bd: #e9d5ff;

      --p-radius:    14px;
      --p-radius-sm: 8px;
      --p-shadow:    0 1px 3px rgba(0,0,0,.07), 0 4px 12px rgba(0,0,0,.05);
      --p-shadow-md: 0 4px 16px rgba(0,0,0,.1), 0 1px 4px rgba(0,0,0,.06);
    }

    *, *::before, *::after { box-sizing: border-box; }

    html, body {
      color-scheme: light;
      background: var(--p-bg);
      color: var(--p-text);
      margin: 0; padding: 0;
      font-family: 'DM Sans', system-ui, sans-serif;
      font-size: 14px;
      -webkit-font-smoothing: antialiased;
    }

    /* Force all text dark — override color-scheme */
    body, p, span, td, th, label, h1, h2, h3, h4, h5, li, a, div, input, select, textarea, button {
      color: var(--p-text);
    }
    input, select, textarea, button { color-scheme: light; }

    /* ── MONO for IDs / codes ── */
    .mono { font-family: 'JetBrains Mono', monospace; letter-spacing: -.02em; }

    /* ── Shared card ── */
    .p-card {
      background: var(--p-surface);
      border: 1px solid var(--p-border);
      border-radius: var(--p-radius);
      box-shadow: var(--p-shadow);
    }

    /* ── Shared input ── */
    .p-input {
      width: 100%;
      border: 1.5px solid var(--p-border);
      border-radius: 10px;
      padding: 9px 13px;
      font-size: 14px;
      font-family: 'DM Sans', sans-serif;
      color: var(--p-text);
      background: var(--p-surface);
      outline: none;
      transition: border-color .15s, box-shadow .15s;
    }
    .p-input:focus {
      border-color: var(--p-green);
      box-shadow: 0 0 0 3px rgba(21,128,61,.12);
    }
    .p-input::placeholder { color: var(--p-faint); }

    /* ── Shared label ── */
    .p-label {
      display: block;
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .06em;
      color: var(--p-muted);
      margin-bottom: 5px;
    }

    /* ── Shared buttons ── */
    .p-btn {
      display: inline-flex; align-items: center; justify-content: center; gap: 6px;
      padding: 9px 16px;
      border: none; border-radius: 10px;
      font-size: 13px; font-weight: 700;
      font-family: 'DM Sans', sans-serif;
      cursor: pointer;
      transition: opacity .15s, transform .1s;
    }
    .p-btn:hover { opacity: .88; }
    .p-btn:active { transform: scale(.97); }
    .p-btn-green  { background: var(--p-green);  color: #fff; }
    .p-btn-teal   { background: var(--p-teal);   color: #fff; }
    .p-btn-ghost  { background: var(--p-bg);     color: var(--p-muted); border: 1.5px solid var(--p-border); }
    .p-btn-amber  { background: var(--p-amber-lt); color: var(--p-amber); border: 1.5px solid var(--p-amber-bd); }
    .p-btn-reload {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 7px 13px; border-radius: 9px;
      font-size: 12px; font-weight: 700;
      background: var(--p-surface);
      border: 1.5px solid var(--p-border);
      color: var(--p-muted); cursor: pointer;
      transition: all .15s;
    }
    .p-btn-reload:hover { background: var(--p-green-lt); border-color: var(--p-green-bd); color: var(--p-green); }
    .p-btn-reload svg { transition: transform .4s; }
    .p-btn-reload:hover svg { transform: rotate(180deg); }
    .p-btn-reload.spinning svg { animation: p-spin .6s linear infinite; }

    /* ── Status badges ── */
    .p-badge {
      display: inline-block;
      padding: 2px 9px; border-radius: 9999px;
      font-size: 11px; font-weight: 700;
      white-space: nowrap;
    }
    .badge-green    { background: var(--p-green-lt);  color: var(--p-green); }
    .badge-teal     { background: var(--p-teal-lt);   color: var(--p-teal); }
    .badge-amber    { background: var(--p-amber-lt);  color: var(--p-amber); }
    .badge-red      { background: var(--p-red-lt);    color: var(--p-red); }
    .badge-indigo   { background: var(--p-indigo-lt); color: var(--p-indigo); }
    .badge-purple   { background: var(--p-purple-lt); color: var(--p-purple); }
    .badge-slate    { background: #f1f5f9;             color: #64748b; }
    .badge-gray     { background: #f3f4f6;             color: #6b7280; }

    /* JO Status badges */
    .st-FOR_PLOTTING { background: #fef9c3; color: #854d0e; }
    .st-PLOTTED      { background: #dbeafe; color: #1e40af; }
    .st-FOR_PRINTING { background: #e0e7ff; color: #3730a3; }
    .st-PRINTING     { background: #dcfce7; color: #166534; }
    .st-COMPLETED    { background: #f1f5f9; color: #64748b; }

    /* ── Filter chips ── */
    .fchip {
      padding: 6px 14px; border-radius: 9999px;
      font-size: 12px; font-weight: 700;
      border: 1.5px solid var(--p-border);
      background: var(--p-surface); cursor: pointer;
      transition: all .15s; white-space: nowrap;
      color: var(--p-muted);
    }
    .fchip.active  { background: var(--p-green); color: #fff; border-color: var(--p-green); }
    .fchip:hover:not(.active) { background: var(--p-green-lt); border-color: var(--p-green-bd); color: var(--p-green); }

    /* ── Section header (inside cards) ── */
    .p-section-title {
      font-size: 11px; font-weight: 800;
      text-transform: uppercase; letter-spacing: .08em;
      color: var(--p-muted); margin-bottom: 12px;
    }

    /* ── Table ── */
    .p-table { width: 100%; border-collapse: collapse; }
    .p-table thead th {
      padding: 10px 14px;
      font-size: 11px; font-weight: 800;
      text-transform: uppercase; letter-spacing: .07em;
      color: var(--p-muted);
      background: var(--p-bg);
      border-bottom: 1px solid var(--p-border);
      text-align: left;
    }
    .p-table tbody tr { transition: background .1s; }
    .p-table tbody tr:hover td { background: #f6fbf8; }
    .p-table tbody td {
      padding: 11px 14px;
      font-size: 13px;
      border-bottom: 1px solid #f0f4f2;
      vertical-align: middle;
    }

    /* ── Search input ── */
    .p-search-wrap { position: relative; }
    .p-search-wrap .icon {
      position: absolute; left: 12px; top: 50%; transform: translateY(-50%);
      pointer-events: none; color: var(--p-faint);
    }
    .p-search-wrap input {
      padding-left: 36px;
    }

    /* ── Skeleton shimmer ── */
    @keyframes shimmer {
      0%   { background-position: -400px 0; }
      100% { background-position:  400px 0; }
    }
    .p-skel {
      background: linear-gradient(90deg, #eff3f1 25%, #e4eae7 50%, #eff3f1 75%);
      background-size: 400px 100%;
      animation: shimmer 1.5s infinite;
      border-radius: 6px; display: inline-block;
    }

    /* ── Spinner ── */
    @keyframes p-spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    .p-spin { animation: p-spin .7s linear infinite; }

    /* ── Alert banners ── */
    .p-alert {
      padding: 12px 14px; border-radius: 10px;
      font-size: 13px; font-weight: 600;
      display: flex; align-items: flex-start; gap: 10px;
    }
    .p-alert-warn  { background: var(--p-amber-lt); border: 1px solid var(--p-amber-bd); color: #92400e; }
    .p-alert-error { background: var(--p-red-lt);   border: 1px solid var(--p-red-bd);   color: #991b1b; }
    .p-alert-info  { background: var(--p-teal-lt);  border: 1px solid var(--p-teal-bd);  color: var(--p-teal); }
    .p-alert-success { background: var(--p-green-lt); border: 1px solid var(--p-green-bd); color: var(--p-green); }

    /* ── Health bars ── */
    .hbar-track { background: var(--p-border); border-radius: 9999px; height: 4px; overflow: hidden; }
    .hbar-fill  { height: 100%; border-radius: 9999px; transition: width .4s ease; }

    /* ── Pagination ── */
    .p-page-btn {
      display: inline-flex; align-items: center; justify-content: center;
      width: 32px; height: 32px; border-radius: 8px;
      font-size: 13px; font-weight: 600; cursor: pointer; border: 1.5px solid var(--p-border);
      background: var(--p-surface); color: var(--p-muted);
      transition: all .15s;
    }
    .p-page-btn:hover  { border-color: var(--p-green); color: var(--p-green); background: var(--p-green-lt); }
    .p-page-btn.active { background: var(--p-green); color: #fff; border-color: var(--p-green); }
    .p-page-btn:disabled { opacity: .35; cursor: not-allowed; }

    /* ════════════════════════════════════════
       SIDEBAR + LAYOUT
    ════════════════════════════════════════ */
    #sidebar {
      position: fixed; left: 0; top: 0; height: 100vh; width: 232px;
      background: var(--p-surface);
      border-right: 1px solid var(--p-border);
      z-index: 40; display: flex; flex-direction: column;
      transition: width .25s ease; overflow: hidden;
    }
    #sidebar.collapsed { width: 52px; }

    .sb-label {
      white-space: nowrap; overflow: hidden;
      opacity: 1; transition: opacity .15s, max-width .25s;
      max-width: 200px;
    }
    #sidebar.collapsed .sb-label { opacity: 0; max-width: 0; pointer-events: none; }

    .nav-link {
      display: flex; align-items: center; gap: 10px;
      padding: 9px 10px; border-radius: 10px;
      font-size: 13px; font-weight: 600;
      color: var(--p-muted);
      text-decoration: none; cursor: pointer;
      transition: background .15s, color .15s;
      white-space: nowrap; overflow: hidden;
      margin-bottom: 2px;
    }
    .nav-link:hover { background: var(--p-bg); color: var(--p-text); }
    .nav-link.active { background: var(--p-green-lt); color: var(--p-green); }
    .nav-link svg { flex-shrink: 0; }

    .nav-divider {
      height: 1px; background: var(--p-border);
      margin: 8px 4px;
    }
    .nav-section {
      font-size: 10px; font-weight: 800;
      text-transform: uppercase; letter-spacing: .1em;
      color: var(--p-faint); padding: 6px 8px 3px;
    }

    #mainContent {
      margin-top: 52px; margin-left: 232px;
      min-height: 100vh;
      transition: margin-left .25s ease;
    }
    #mainContent.sidebar-collapsed { margin-left: 52px; }

    .tab-pane { display: none; }
    .tab-pane.active { display: block; }

    @media (max-width: 767px) {
      #sidebar { width: 232px; transform: translateX(-232px); transition: transform .25s ease; }
      #sidebar.mobile-open { transform: translateX(0); box-shadow: 4px 0 24px rgba(0,0,0,.15); }
      #mainContent { margin-left: 0 !important; }
    }

    #sidebarOverlay {
      display: none; position: fixed; inset: 0; z-index: 35;
      background: rgba(0,0,0,.35);
    }

    /* ── Navbar ── */
    #navbar {
      position: fixed; top: 0; left: 0; right: 0; height: 52px;
      background: var(--p-surface);
      border-bottom: 1px solid var(--p-border);
      z-index: 50;
      display: flex; align-items: center; padding: 0 12px; gap: 10px;
    }

    /* ── PRISM gradient ── */
    .prism-grad { background: linear-gradient(135deg, #15803d 0%, #0d9488 100%); }
  </style>
</head>
<body>

<div id="sidebarOverlay"></div>

      <span id="roleBadgeText" class="sb-label" style="font-size:12px;font-weight:700;color:var(--p-green);max-width:999px;opacity:1;">Loading…</span>

</aside>

<!-- MAIN CONTENT -->
<main id="mainContent">
  <div id="tab-dashboard"  class="tab-pane active"><?!= include('RollDashboard') ?></div>
  <div id="tab-stock-in"   class="tab-pane"><?!= include('RollStockIn') ?></div>
  <div id="tab-job-orders" class="tab-pane"><?!= include('PRISMJobOrders') ?></div>

  <div id="tab-materials"  class="tab-pane"><?!= include('PRISMMaterials') ?></div>

<script>
/* ═══════════════════════════════════════════
   PRISM GLOBAL SHELL SCRIPTS
═══════════════════════════════════════════ */
var sidebarCollapsed = false, isMobileView = false;

function checkMobile() { isMobileView = window.innerWidth < 768; }
checkMobile();

/* Sidebar toggle */
document.getElementById('sidebarToggle').addEventListener('click', function() {
  var sb = document.getElementById('sidebar');
  var mc = document.getElementById('mainContent');
  var ov = document.getElementById('sidebarOverlay');
  if (isMobileView) {
    var open = sb.classList.contains('mobile-open');
    sb.classList.toggle('mobile-open', !open);
    ov.style.display = open ? 'none' : 'block';
  } else {
    sidebarCollapsed = !sidebarCollapsed;
    sb.classList.toggle('collapsed', sidebarCollapsed);
    mc.classList.toggle('sidebar-collapsed', sidebarCollapsed);
  }
});
document.getElementById('sidebarOverlay').addEventListener('click', function() {
  document.getElementById('sidebar').classList.remove('mobile-open');
  this.style.display = 'none';
});
window.addEventListener('resize', function() {
  checkMobile();
  if (!isMobileView) {
    document.getElementById('sidebar').classList.remove('mobile-open');
    document.getElementById('sidebarOverlay').style.display = 'none';
    document.getElementById('sidebar').classList.toggle('collapsed', sidebarCollapsed);
    document.getElementById('mainContent').classList.toggle('sidebar-collapsed', sidebarCollapsed);
  } else {
    document.getElementById('sidebar').classList.remove('collapsed');
    document.getElementById('mainContent').classList.remove('sidebar-collapsed');
  }
});

/* Tab switching */
var initializedTabs = {};
function switchTab(t) {
  document.querySelectorAll('.tab-pane').forEach(function(p) { p.classList.remove('active'); });
  var tgt = document.getElementById('tab-' + t);
  if (tgt) tgt.classList.add('active');
  document.querySelectorAll('.nav-link').forEach(function(l) { l.classList.remove('active'); });
  var al = document.querySelector('[data-tab="' + t + '"]');
  if (al) al.classList.add('active');
  if (isMobileView) {
    document.getElementById('sidebar').classList.remove('mobile-open');
    document.getElementById('sidebarOverlay').style.display = 'none';
  }
  var fn = 'prism_init_' + t.replace(/-/g, '_');
  if (!initializedTabs[t] && typeof window[fn] === 'function') {
    initializedTabs[t] = true;
    window[fn]();
  }
}
document.querySelectorAll('.nav-link').forEach(function(l) {
  l.addEventListener('click', function(e) { e.preventDefault(); switchTab(l.getAttribute('data-tab')); });
});

/* User info load + role-based nav */
google.script.run
  .withSuccessHandler(function(u) {
    document.getElementById('userEmail').textContent  = u.email || '';
    document.getElementById('userAvatar').textContent = (u.email || 'U').charAt(0).toUpperCase();
    document.getElementById('roleBadgeText').textContent = u.role || 'No Role';

    var role = ((u.role || '').toLowerCase());
    var isAdmin = role.includes('admin');
    var isATL   = role.includes('admin team leader') || role.includes('admin tl');
    var isSTL   = role.includes('senior team leader') || role.includes('stl');

    if (!isAdmin && !isATL) {
      document.getElementById('nav-stock-in').style.display   = 'none';
      document.getElementById('nav-materials').style.display  = 'none';
    }
    if (!isAdmin) {
      document.getElementById('nav-settings').style.display  = 'none';
      document.getElementById('nav-plotting').style.display  = 'none';
    }
    switchTab('dashboard');
    prism_init_dashboard();
  })
  .withFailureHandler(function() {
    document.getElementById('roleBadgeText').textContent = 'No Role';
    switchTab('dashboard');
    prism_init_dashboard();
  })
  .prism_getUserInfoPublic();

/* ── Global toast ── */
function prism_toast(type, msg) {
  var el = document.getElementById('prism_toast');
  if (el) el.remove();
  var t = document.createElement('div');
  t.id = 'prism_toast';
  var bg = type === 'success' ? 'var(--p-green)' : type === 'info' ? 'var(--p-indigo)' : 'var(--p-red)';
  var mob = window.innerWidth < 640;
  t.style.cssText = 'position:fixed;bottom:20px;z-index:9999;display:flex;align-items:center;gap:8px;'
    + 'padding:11px 18px;border-radius:11px;box-shadow:0 6px 24px rgba(0,0,0,.18);'
    + 'font-size:13px;font-weight:700;font-family:DM Sans,sans-serif;color:#fff;'
    + 'background:' + bg + ';'
    + (mob ? 'left:50%;transform:translateX(-50%);white-space:nowrap;' : 'right:20px;');
  var icon = type === 'success'
    ? '<svg style="width:14px;height:14px;flex-shrink:0;" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M5 13l4 4L19 7"/></svg>'
    : '<svg style="width:14px;height:14px;flex-shrink:0;" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M6 18L18 6M6 6l12 12"/></svg>';
  t.innerHTML = icon + String(msg || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  document.body.appendChild(t);
  setTimeout(function() { if (t.parentNode) t.remove(); }, 4500);
}
window.prism_toast = prism_toast;

/* ── Reload button helper ── */
function prism_setReloading(btnId, loading) {
  var btn = document.getElementById(btnId);
  if (!btn) return;
  if (loading) btn.classList.add('spinning');
  else         btn.classList.remove('spinning');
  btn.disabled = loading;
}
window.prism_setReloading = prism_setReloading;
</script>
