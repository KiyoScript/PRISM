<!-- PRISMJobOrders.html v4 — Read-only view (JOs come from Job Web App) + Reload -->
<style>
  #tab-job-orders, #tab-job-orders * { color: var(--p-text); }
  .jo3-row:hover td { background: #f6fbf8 !important; }
  .jo3-roll { font-family: 'JetBrains Mono', monospace; font-size: 12px; font-weight: 700; color: var(--p-purple); }
  .st-READY_TO_PRINT { background: #dbeafe; color: #1e40af; }
  .st-PRINTING       { background: #dcfce7; color: #166534; }
  .st-COMPLETED      { background: #f1f5f9; color: #64748b; }
  .st-FOR_PLOTTING   { background: #fef9c3; color: #854d0e; }
  .jo3-action-btn { padding: 4px 10px; border-radius: 6px; font-size: 11px; font-weight: 700; border: none; cursor: pointer; white-space: nowrap; }
  .jo3-btn-printing  { background: #dcfce7; color: #166534; }
  .jo3-btn-completed { background: #f1f5f9; color: #374151; }
  .jo3-btn-printing:hover  { background: #bbf7d0; }
  .jo3-btn-completed:hover { background: #e5e7eb; }
  .jo3-btn-plot { background: #f3e8ff; color: #6d28d9; }
  .jo3-btn-plot:hover { background: #e9d5ff; }
  .jo3-btn-view { background: #e0f2fe; color: #075985; }
  .jo3-btn-view:hover { background: #bae6fd; }
  .jo3-btn-pdf { background: #fee2e2; color: #991b1b; }
  .jo3-btn-pdf:hover { background: #fecaca; }
</style>

<div style="padding:20px 20px 40px;">

  <!-- Page header -->
  <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:20px;">
    <div>
      <h2 style="font-size:20px;font-weight:800;letter-spacing:-.02em;margin:0 0 3px;">Job Orders</h2>
      <p style="font-size:13px;color:var(--p-muted);margin:0;">LFP job orders — auto-synced from Job Web App</p>
    </div>
    <button id="jo3-reloadBtn" class="p-btn-reload" onclick="jo3_reload()">
      <svg width="13" height="13" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5"
          d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/>
      </svg>
      Reload
    </button>
  </div>

  <!-- Info banner -->
  <div class="p-alert p-alert-info" style="margin-bottom:16px;">
    <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24" style="flex-shrink:0;margin-top:1px;">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
    </svg>
    Job Orders are created in the Job Web App and automatically synced here. To add a new JO, submit from the Job Order System.
  </div>

  <!-- Search + filter row -->
  <div style="display:flex;flex-wrap:wrap;gap:10px;margin-bottom:12px;align-items:center;">
    <div class="p-search-wrap" style="flex:1;min-width:200px;">
      <span class="icon">
        <svg width="14" height="14" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-4.35-4.35M17 11A6 6 0 1 1 5 11a6 6 0 0 1 12 0z"/>
        </svg>
      </span>
      <input type="text" id="jo3-search" class="p-input" placeholder="Search JO number or customer…" oninput="jo3_apply()">
    </div>
    <p id="jo3-count" style="font-size:12px;color:var(--p-faint);font-weight:600;white-space:nowrap;margin:0;"></p>
  </div>

  <!-- Status filter chips -->
  <div style="display:flex;gap:6px;overflow-x:auto;padding-bottom:4px;margin-bottom:16px;">
    <button class="fchip active" onclick="jo3_setStatus('ALL',this)">All</button>
    <button class="fchip" onclick="jo3_setStatus('FOR_PLOTTING',this)">For Plotting</button>
    <button class="fchip" onclick="jo3_setStatus('READY_TO_PRINT',this)">Ready to Print</button>
    <button class="fchip" onclick="jo3_setStatus('PRINTING',this)">Printing</button>
    <button class="fchip" onclick="jo3_setStatus('COMPLETED',this)">Completed</button>
  </div>

  <!-- Desktop table -->
  <div id="jo3-tableWrap" class="p-card" style="display:none;overflow:hidden;">
    <div style="overflow-x:auto;">
      <table class="p-table" style="min-width:700px;">
        <thead>
          <tr>
            <th>JO Number</th>
            <th>Customer</th>
            <th>Description</th>
            <th>Category</th>
            <th>Size</th>
            <th>Status</th>
            <th>Roll ID</th>
            <th>Date</th>
            <th>Action</th>
          </tr>
        </thead>
        <tbody id="jo3-tbody">
          <tr><td colspan="8" style="text-align:center;padding:40px;color:var(--p-faint);">Loading…</td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <!-- Mobile cards -->
  <div id="jo3-cards" style="display:none;" class="space-y-3"></div>

  <!-- Pagination -->
  <div id="jo3-pagination" style="display:flex;align-items:center;gap:6px;margin-top:14px;flex-wrap:wrap;"></div>

</div>

<script>
var jo3_all = [], jo3_statusFilter = 'ALL';
var jo3_page = 1, jo3_pageSize = 20;
var jo3_filtered = [];

function prism_init_job_orders() {
  jo3_initLayout();
  jo3_loadData();
}

function jo3_reload() {
  prism_setReloading('jo3-reloadBtn', true);
  jo3_loadData();
}

function jo3_loadData() {
  google.script.run
    .withSuccessHandler(function(r) {
      prism_setReloading('jo3-reloadBtn', false);
      if (r && r.success) {
        jo3_all = (r.data || []).sort(function(a, b) {
          return new Date(b.dateCreated) - new Date(a.dateCreated);
        });
        jo3_page = 1;
        jo3_apply();
      } else {
        jo3_error((r && r.message) || 'Failed to load.');
      }
    })
    .withFailureHandler(function(e) {
      prism_setReloading('jo3-reloadBtn', false);
      jo3_error(e.message);
    })
    .prism_getJobOrdersPublic();
}

function jo3_initLayout() {
  var mob = window.innerWidth < 640;
  document.getElementById('jo3-tableWrap').style.display = mob ? 'none' : 'block';
  document.getElementById('jo3-cards').style.display     = mob ? 'block' : 'none';
}
window.addEventListener('resize', jo3_initLayout);

function jo3_setStatus(s, el) {
  jo3_statusFilter = s;
  document.querySelectorAll('#tab-job-orders .fchip').forEach(function(c) { c.classList.remove('active'); });
  el.classList.add('active');
  jo3_page = 1;
  jo3_apply();
}

function jo3_apply() {
  var q = (document.getElementById('jo3-search').value || '').trim().toLowerCase();
  jo3_filtered = jo3_all.filter(function(r) {
    if (jo3_statusFilter !== 'ALL' && r.status !== jo3_statusFilter) return false;
    if (q && (r.joNumber + ' ' + r.customer + ' ' + (r.jobDescription || '')).toLowerCase().indexOf(q) === -1) return false;
    return true;
  });
  document.getElementById('jo3-count').textContent = jo3_filtered.length + ' order' + (jo3_filtered.length !== 1 ? 's' : '');
  jo3_renderPage();
  jo3_renderPagination();
}

function jo3_renderPage() {
  var start = (jo3_page - 1) * jo3_pageSize;
  var slice = jo3_filtered.slice(start, start + jo3_pageSize);
  jo3_renderTable(slice);
  jo3_renderCards(slice);
}

function jo3_renderPagination() {
  var total = Math.ceil(jo3_filtered.length / jo3_pageSize);
  var el = document.getElementById('jo3-pagination');
  if (total <= 1) { el.innerHTML = ''; return; }
  var h = '';
  h += '<button class="p-page-btn" onclick="jo3_goPage(jo3_page-1)" ' + (jo3_page <= 1 ? 'disabled' : '') + '>‹</button>';
  var start = Math.max(1, jo3_page - 2), end = Math.min(total, jo3_page + 2);
  if (start > 1) h += '<button class="p-page-btn" onclick="jo3_goPage(1)">1</button>' + (start > 2 ? '<span style="padding:0 4px;color:var(--p-faint);">…</span>' : '');
  for (var i = start; i <= end; i++) {
    h += '<button class="p-page-btn' + (i === jo3_page ? ' active' : '') + '" onclick="jo3_goPage(' + i + ')">' + i + '</button>';
  }
  if (end < total) h += (end < total - 1 ? '<span style="padding:0 4px;color:var(--p-faint);">…</span>' : '') + '<button class="p-page-btn" onclick="jo3_goPage(' + total + ')">' + total + '</button>';
  h += '<button class="p-page-btn" onclick="jo3_goPage(jo3_page+1)" ' + (jo3_page >= total ? 'disabled' : '') + '>›</button>';
  h += '<span style="font-size:12px;color:var(--p-faint);font-weight:600;margin-left:4px;">Page ' + jo3_page + ' of ' + total + '</span>';
  el.innerHTML = h;
}

function jo3_goPage(p) {
  var total = Math.ceil(jo3_filtered.length / jo3_pageSize);
  if (p < 1 || p > total) return;
  jo3_page = p;
  jo3_renderPage();
  jo3_renderPagination();
}

function jo3_renderTable(data) {
  var tb = document.getElementById('jo3-tbody');
  if (!data.length) {
    tb.innerHTML = '<tr><td colspan="9" style="text-align:center;padding:40px;color:var(--p-faint);">No records found.</td></tr>';
    return;
  }
  var h = '';
  data.forEach(function(r) {
    var sc = 'p-badge st-' + (r.status || 'FOR_PLOTTING');
    var size = (r.width && r.height) ? r.width + ' × ' + r.height + ' ft' : '—';
    var actionBtn = '';
    if (r.status === 'FOR_PLOTTING') {
      actionBtn = '<button class="jo3-action-btn jo3-btn-plot" onclick="jo3_goToRecordUsage(\'' + jo3_esc(r.joNumber) + '\')">✏ Record Usage</button>';
    } else if (r.status === 'READY_TO_PRINT') {
      actionBtn = '<button class="jo3-action-btn jo3-btn-printing" onclick="jo3_updateStatus(\'' + jo3_esc(r.joNumber) + '\',\'PRINTING\',this)">▶ Mark Printing</button>';
    } else if (r.status === 'PRINTING') {
      actionBtn = '<button class="jo3-action-btn jo3-btn-completed" onclick="jo3_updateStatus(\'' + jo3_esc(r.joNumber) + '\',\'COMPLETED\',this)">✓ Mark Completed</button>';
    }
    if (r.plottingImageUrl || r.plottingPdfUrl) {
      actionBtn = '<div style="display:flex;flex-direction:column;gap:6px;align-items:stretch;">'
        + (r.plottingImageUrl ? '<button class="jo3-action-btn jo3-btn-view" onclick="jo3_viewPlot(\'' + jo3_esc(r.plottingImageUrl) + '\')">🖼 View Image</button>' : '')
        + (r.plottingPdfUrl ? '<button class="jo3-action-btn jo3-btn-pdf" onclick="jo3_viewPlot(\'' + jo3_esc(r.plottingPdfUrl) + '\')">📄 View PDF</button>' : '')
        + (actionBtn || '')
        + '</div>';
    }
    h += '<tr class="jo3-row">'
      + '<td><span class="mono" style="font-weight:700;color:var(--p-indigo);">' + jo3_esc(r.joNumber) + '</span></td>'
      + '<td style="font-weight:600;">' + jo3_esc(r.customer) + '</td>'
      + '<td style="max-width:180px;color:var(--p-muted);font-size:12px;">' + jo3_esc(r.jobDescription || '—') + '</td>'
      + '<td><span class="p-badge badge-slate">' + jo3_esc(r.category || '—') + '</span></td>'
      + '<td style="font-size:12px;color:var(--p-muted);">' + size + '</td>'
      + '<td><span class="p-badge ' + sc + '">' + jo3_esc(r.status || 'FOR_PLOTTING') + '</span></td>'
      + '<td>' + jo3_renderRolls(r.rollId) + '</td>'
      + '<td style="font-size:11px;color:var(--p-faint);">' + jo3_esc(r.dateCreated) + '</td>'
      + '<td>' + actionBtn + '</td>'
      + '</tr>';
  });
  tb.innerHTML = h;
}

function jo3_renderCards(data) {
  var el = document.getElementById('jo3-cards');
  if (!data.length) {
    el.innerHTML = '<div class="p-card" style="padding:32px;text-align:center;color:var(--p-faint);font-size:13px;">No records found.</div>';
    return;
  }
  var h = '';
  data.forEach(function(r) {
    var sc = 'p-badge st-' + (r.status || 'FOR_PLOTTING');
    var size = (r.width && r.height) ? r.width + ' × ' + r.height + ' ft' : '';
    var actionHtml = '';
    if (r.plottingImageUrl) {
      actionHtml += '<button class="jo3-action-btn jo3-btn-view" style="width:100%;margin-top:8px;" onclick="jo3_viewPlot(\'' + jo3_esc(r.plottingImageUrl) + '\')">🖼 View Image</button>';
    }
    if (r.plottingPdfUrl) {
      actionHtml += '<button class="jo3-action-btn jo3-btn-pdf" style="width:100%;margin-top:8px;" onclick="jo3_viewPlot(\'' + jo3_esc(r.plottingPdfUrl) + '\')">📄 View PDF</button>';
    }
    if (r.status === 'FOR_PLOTTING') {
      actionHtml += '<button class="jo3-action-btn jo3-btn-plot" style="width:100%;' + (actionHtml ? 'margin-top:8px;' : '') + '" onclick="jo3_goToRecordUsage(\'' + jo3_esc(r.joNumber) + '\')">✏ Record Usage</button>';
    } else if (r.status === 'READY_TO_PRINT') {
      actionHtml += '<button class="jo3-action-btn jo3-btn-printing" style="width:100%;' + (actionHtml ? 'margin-top:8px;' : '') + '" onclick="jo3_updateStatus(\'' + jo3_esc(r.joNumber) + '\',\'PRINTING\',this)">▶ Mark Printing</button>';
    } else if (r.status === 'PRINTING') {
      actionHtml += '<button class="jo3-action-btn jo3-btn-completed" style="width:100%;' + (actionHtml ? 'margin-top:8px;' : '') + '" onclick="jo3_updateStatus(\'' + jo3_esc(r.joNumber) + '\',\'COMPLETED\',this)">✓ Mark Completed</button>';
    }
    h += '<div class="p-card" style="padding:14px;">'
      + '<div style="display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:8px;">'
      + '<span class="mono" style="font-weight:700;color:var(--p-indigo);font-size:13px;">' + jo3_esc(r.joNumber) + '</span>'
      + '<span class="p-badge ' + sc + '">' + jo3_esc(r.status || 'FOR_PLOTTING') + '</span>'
      + '</div>'
      + '<p style="font-weight:700;font-size:14px;margin:0 0 4px;">' + jo3_esc(r.customer) + '</p>'
      + (r.jobDescription ? '<p style="font-size:12px;color:var(--p-muted);margin:0 0 8px;">' + jo3_esc(r.jobDescription) + '</p>' : '')
      + '<div style="display:flex;flex-wrap:wrap;gap:6px;align-items:center;margin-bottom:8px;">'
      + (r.category ? '<span class="p-badge badge-slate">' + jo3_esc(r.category) + '</span>' : '')
      + (size ? '<span style="font-size:11px;color:var(--p-muted);">' + size + '</span>' : '')
      + (r.rollId ? jo3_renderRollsInline(r.rollId) : '')
      + '</div>'
      + actionHtml
      + '</div>';
  });
  el.innerHTML = h;
}

function jo3_viewPlot(url) {
  if (!url) return;
  window.open(url, '_blank');
}

/* ── Render Roll IDs — handles single or comma-separated multi-roll ── */
function jo3_renderRolls(rollId) {
  if (!rollId || !rollId.trim()) return '<span style="color:var(--p-faint);">—</span>';
  return rollId.split(',').map(function(id) {
    id = id.trim();
    return id ? '<span class="jo3-roll" style="display:inline-block;margin:1px 3px 1px 0;">' + jo3_esc(id) + '</span>' : '';
  }).join('');
}

function jo3_renderRollsInline(rollId) {
  if (!rollId || !rollId.trim()) return '';
  var ids = rollId.split(',').map(function(x) { return x.trim(); }).filter(Boolean);
  if (!ids.length) return '';
  return ids.map(function(id) {
    return '<span class="jo3-roll" style="display:inline-block;margin:1px 3px 1px 0;">Roll: ' + jo3_esc(id) + '</span>';
  }).join('');
}

function jo3_updateStatus(joNumber, newStatus, btn) {
  var label = newStatus === 'PRINTING' ? '▶ Mark Printing' : '✓ Mark Completed';
  btn.disabled = true;
  btn.textContent = 'Updating…';
  google.script.run
    .withSuccessHandler(function(r) {
      if (r.success) {
        prism_toast('success', joNumber + ' → ' + newStatus.replace(/_/g, ' '));
        for (var i = 0; i < jo3_all.length; i++) {
          if (jo3_all[i].joNumber === joNumber) { jo3_all[i].status = newStatus; break; }
        }
        jo3_apply();
      } else {
        btn.disabled = false;
        btn.textContent = label;
        prism_toast('error', r.message);
      }
    })
    .withFailureHandler(function(e) {
      btn.disabled = false;
      btn.textContent = label;
      prism_toast('error', e.message);
    })
    .prism_updateJOStatus(joNumber, newStatus);
}

function jo3_goToRecordUsage(joNumber) {
  switchTab('usage');
}

function jo3_error(msg) {
  document.getElementById('jo3-tbody').innerHTML =
    '<tr><td colspan="9" style="text-align:center;padding:40px;color:var(--p-red);">Error: ' + jo3_esc(msg) + '</td></tr>';
}

function jo3_esc(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
</script>
