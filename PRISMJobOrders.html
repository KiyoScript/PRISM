<!-- PRISMJobOrders.html v5 — Full redesign: viewport-fit, 4 report tabs -->
<style>
  #tab-job-orders, #tab-job-orders * { color: var(--p-text); }

  #jo-shell {
    display: flex;
    flex-direction: column;
    height: calc(100vh - 52px);
    padding: 0;
    overflow: hidden;
  }

  #jo-topbar {
    flex-shrink: 0;
    padding: 16px 20px 0;
    background: var(--p-bg);
  }

  #jo-tabs-row {
    flex-shrink: 0;
    display: flex;
    gap: 0;
    padding: 0 20px;
    border-bottom: 1px solid var(--p-border);
    background: var(--p-bg);
    overflow-x: auto;
  }

  .jo-tab {
    padding: 10px 18px;
    font-size: 12px;
    font-weight: 700;
    border: none;
    background: transparent;
    cursor: pointer;
    color: var(--p-muted);
    border-bottom: 2px solid transparent;
    white-space: nowrap;
    transition: all .15s;
  }
  .jo-tab.active { color: var(--p-green); border-bottom-color: var(--p-green); }
  .jo-tab:hover:not(.active) { color: var(--p-text); }

  #jo-content {
    flex: 1;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    padding: 12px 20px 16px;
  }

  #jo-filter-row {
    flex-shrink: 0;
    display: flex;
    gap: 10px;
    align-items: center;
    margin-bottom: 10px;
    flex-wrap: wrap;
  }

  #jo-table-wrap {
    flex: 1;
    overflow: auto;
    border-radius: 12px;
    border: 1px solid var(--p-border);
    background: var(--p-surface);
  }

  #jo-pagination-row {
    flex-shrink: 0;
    display: flex;
    align-items: center;
    gap: 6px;
    padding-top: 10px;
    flex-wrap: wrap;
  }

  .jo-tbl { width: 100%; border-collapse: collapse; }
  .jo-tbl thead th {
    position: sticky;
    top: 0;
    z-index: 2;
    padding: 9px 12px;
    font-size: 11px;
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: .07em;
    color: var(--p-muted);
    background: var(--p-bg);
    border-bottom: 1px solid var(--p-border);
    text-align: left;
    white-space: nowrap;
  }
  .jo-tbl tbody tr:hover td { background: #f6fbf8; }
  .jo-tbl tbody td {
    padding: 9px 12px;
    font-size: 12px;
    border-bottom: 1px solid #f0f4f2;
    vertical-align: middle;
  }
  .jo-tbl tbody tr:last-child td { border-bottom: none; }

  .jo-num  { font-family: 'JetBrains Mono', monospace; font-weight: 700; color: var(--p-indigo); font-size: 12px; }
  .jo-roll { font-family: 'JetBrains Mono', monospace; font-weight: 700; color: var(--p-purple); font-size: 11px; }

  .st-FOR_PLOTTING   { background: #fef9c3; color: #854d0e; }
  .st-READY_TO_PRINT { background: #dbeafe; color: #1e40af; }
  .st-PRINTING       { background: #dcfce7; color: #166534; }
  .st-COMPLETED      { background: #f1f5f9; color: #64748b; }

  .jo-action-btn {
    padding: 3px 9px;
    border-radius: 6px;
    font-size: 11px;
    font-weight: 700;
    border: none;
    cursor: pointer;
    white-space: nowrap;
  }
  .jo-btn-plot      { background: #f3e8ff; color: #6d28d9; }
  .jo-btn-plot:hover { background: #e9d5ff; }
  .jo-btn-printing  { background: #dcfce7; color: #166534; }
  .jo-btn-completed { background: #f1f5f9; color: #374151; }
  .jo-btn-view      { background: #e0f2fe; color: #075985; }

  .dmg-row { background: rgba(239,68,68,0.04); }
  .dmg-row:hover td { background: rgba(239,68,68,0.08) !important; }
  .test-row { background: rgba(245,158,11,0.04); }
  .test-row:hover td { background: rgba(245,158,11,0.08) !important; }
</style>

<div id="jo-shell">

  <!-- Top bar -->
  <div id="jo-topbar">
    <div style="display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:12px;">
      <div>
        <h2 style="font-size:18px;font-weight:800;letter-spacing:-.02em;margin:0 0 2px;">Job Orders</h2>
        <p style="font-size:12px;color:var(--p-muted);margin:0;">LFP job orders — synced from Job Web App</p>
      </div>
      <button id="jo-reloadBtn" class="p-btn-reload" onclick="jo_reload()">
        <svg width="13" height="13" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5"
            d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/>
        </svg>
        Reload
      </button>
    </div>
  </div>

  <!-- Tab row -->
  <div id="jo-tabs-row">
    <button class="jo-tab active" onclick="jo_setTab('all',this)">All Job Orders</button>
    <button class="jo-tab" onclick="jo_setTab('completed',this)">Completed</button>
    <button class="jo-tab" onclick="jo_setTab('damage',this)">Damage Report</button>
    <button class="jo-tab" onclick="jo_setTab('testprint',this)">Test Print Report</button>
  </div>

  <!-- Content area -->
  <div id="jo-content">

    <!-- Filter row -->
    <div id="jo-filter-row">
      <div class="p-search-wrap" style="flex:1;min-width:180px;">
        <span class="icon">
          <svg width="14" height="14" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-4.35-4.35M17 11A6 6 0 1 1 5 11a6 6 0 0 1 12 0z"/>
          </svg>
        </span>
        <input type="text" id="jo-search" class="p-input" placeholder="Search…" oninput="jo_apply()" style="font-size:12px;">
      </div>

      <!-- Status chips — only shown on All tab -->
      <div id="jo-status-chips" style="display:flex;gap:6px;overflow-x:auto;">
        <button class="fchip" onclick="jo_setStatus('ALL',this)">All</button>
        <button class="fchip active" onclick="jo_setStatus('FOR_PLOTTING',this)">For Plotting</button>
        <button class="fchip" onclick="jo_setStatus('READY_TO_PRINT',this)">Ready to Print</button>
      </div>

      <p id="jo-count" style="font-size:12px;color:var(--p-faint);font-weight:600;white-space:nowrap;margin:0;flex-shrink:0;"></p>
    </div>

    <!-- Scrollable table -->
    <div id="jo-table-wrap">
      <table class="jo-tbl">
        <thead id="jo-thead">
          <tr>
            <th>JO Number</th>
            <th>Customer</th>
            <th>Description</th>
            <th>Size</th>
            <th>Status</th>
            <th>Roll</th>
            <th>Date</th>
            <th>Action</th>
          </tr>
        </thead>
        <tbody id="jo-tbody">
          <tr><td colspan="8" style="text-align:center;padding:40px;color:var(--p-faint);">Loading…</td></tr>
        </tbody>
      </table>
    </div>

    <!-- Pagination -->
    <div id="jo-pagination-row"></div>

  </div>
</div>

<script>
var jo_tab        = 'all';
var jo_statusFilter = 'FOR_PLOTTING';
var jo_page       = 1;
var jo_pageSize   = 30;
var jo_all        = [];
var jo_damages    = [];
var jo_testPrints = [];
var jo_filtered   = [];

function prism_init_job_orders() {
  jo_loadData();
}

function jo_reload() {
  prism_setReloading('jo-reloadBtn', true);
  jo_loadData();
}

function jo_loadData() {
  prism_setReloading('jo-reloadBtn', true);
  google.script.run
    .withSuccessHandler(function(r) {
      if (r && r.success) {
        jo_all = (r.data || []).sort(function(a,b){
          return new Date(b.dateCreated) - new Date(a.dateCreated);
        });
      }
      jo_page = 1;
      jo_apply();
    })
    .withFailureHandler(function() { prism_setReloading('jo-reloadBtn', false); })
    .prism_getJobOrdersPublic();
 
  google.script.run
    .withSuccessHandler(function(r) {
      prism_setReloading('jo-reloadBtn', false);
      if (r && r.success) {
        jo_damages    = r.damages    || [];
        jo_testPrints = r.testPrints || [];
        if (jo_tab === 'damage' || jo_tab === 'testprint') jo_apply();
      }
    })
    .withFailureHandler(function() { prism_setReloading('jo-reloadBtn', false); })
    .prism_getJobOrderReports();
}
 
function jo_setTab(tab, el) {
  jo_tab  = tab;
  jo_page = 1;
  document.querySelectorAll('.jo-tab').forEach(function(b){ b.classList.remove('active'); });
  el.classList.add('active');
  document.getElementById('jo-status-chips').style.display = (tab === 'all') ? 'flex' : 'none';
  document.getElementById('jo-search').placeholder =
    tab === 'damage'    ? 'Search roll ID or operator…' :
    tab === 'testprint' ? 'Search roll ID or operator…' : 'Search JO or customer…';
  jo_updateHeaders();
  jo_apply();
}

function jo_updateHeaders() {
  var th = document.getElementById('jo-thead');
  if (jo_tab === 'damage') {
    th.innerHTML = '<tr><th>Roll ID</th><th>JOs</th><th>Customer</th><th>Damage Length</th><th>Operator</th><th>Reason</th><th>Date</th></tr>';
  } else if (jo_tab === 'testprint') {
    th.innerHTML = '<tr><th>Roll ID</th><th>Length Used</th><th>Operator</th><th>Notes</th><th>Date</th></tr>';
  } else {
    th.innerHTML = '<tr><th>JO Number</th><th>Customer</th><th>Description</th><th>Size</th><th>Status</th><th>Roll</th><th>Date</th><th>Action</th></tr>';
  }
}

function jo_setStatus(s, el) {
  jo_statusFilter = s;
  document.querySelectorAll('#jo-status-chips .fchip').forEach(function(c){ c.classList.remove('active'); });
  el.classList.add('active');
  jo_page = 1;
  jo_apply();
}

function jo_apply() {
  var q = (document.getElementById('jo-search').value || '').trim().toLowerCase();

  if (jo_tab === 'damage') {
    jo_filtered = jo_damages.filter(function(r){
      return !q || (r.rollId + ' ' + r.operator + ' ' + (r.plottingLink||'')).toLowerCase().indexOf(q) !== -1;
    });
  } else if (jo_tab === 'testprint') {
    jo_filtered = jo_testPrints.filter(function(r){
      return !q || (r.rollId + ' ' + r.operator + ' ' + (r.plottingLink||'')).toLowerCase().indexOf(q) !== -1;
    });
  } else {
    var src = jo_tab === 'completed'
      ? jo_all.filter(function(r){ return r.status === 'COMPLETED'; })
      : jo_all;
    jo_filtered = src.filter(function(r){
      if (jo_tab === 'all' && jo_statusFilter !== 'ALL' && r.status !== jo_statusFilter) return false;
      if (q && (r.joNumber + ' ' + r.customer + ' ' + (r.jobDescription||'')).toLowerCase().indexOf(q) === -1) return false;
      return true;
    });
  }

  document.getElementById('jo-count').textContent = jo_filtered.length + ' record' + (jo_filtered.length !== 1 ? 's' : '');
  jo_renderPage();
  jo_renderPagination();
}

function jo_renderPage() {
  var start = (jo_page - 1) * jo_pageSize;
  var slice = jo_filtered.slice(start, start + jo_pageSize);
  var tb = document.getElementById('jo-tbody');

  if (!slice.length) {
    var cols = (jo_tab === 'damage') ? 6 : (jo_tab === 'testprint') ? 5 : 8;
    tb.innerHTML = '<tr><td colspan="' + cols + '" style="text-align:center;padding:40px;color:var(--p-faint);">No records found.</td></tr>';
    return;
  }

  var h = '';
  if (jo_tab === 'damage') {
    slice.forEach(function(r) {
      var joTag = (r.joNumbers && r.joNumbers.length)
        ? r.joNumbers.map(function(j){ return '<span class="jo-num" style="margin-right:3px;">'+jo_esc(j)+'</span>'; }).join('')
        : '<span style="color:var(--p-faint);">—</span>';
      var custTag = jo_esc(r.customer || '—');
      h += '<tr class="dmg-row">'
        + '<td><span class="jo-roll">' + jo_esc(r.rollId) + '</span></td>'
        + '<td>' + joTag + '</td>'
        + '<td style="font-size:12px;font-weight:600;">' + custTag + '</td>'
        + '<td><span style="font-weight:700;color:#dc2626;">' + (r.lengthUsed||0) + ' ft</span></td>'
        + '<td style="font-size:11px;">' + jo_esc(r.operator) + '</td>'
        + '<td style="font-size:11px;color:var(--p-muted);max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">' + jo_esc(r.reason||'—') + '</td>'
        + '<td style="font-size:11px;color:var(--p-faint);white-space:nowrap;">' + jo_esc(r.date) + '</td>'
        + '</tr>';
    });
  } else if (jo_tab === 'testprint') {
    slice.forEach(function(r) {
      h += '<tr class="test-row">'
        + '<td><span class="jo-roll">' + jo_esc(r.rollId) + '</span></td>'
        + '<td><span style="font-weight:700;color:var(--p-amber);">' + (r.lengthUsed||0) + ' ft</span></td>'
        + '<td style="font-size:11px;">' + jo_esc(r.operator) + '</td>'
        + '<td style="font-size:11px;color:var(--p-muted);max-width:220px;">' + jo_esc(r.plottingLink||'—') + '</td>'
        + '<td style="font-size:11px;color:var(--p-faint);">' + jo_esc(r.dateUsed) + '</td>'
        + '</tr>';
    });
  } else {
    slice.forEach(function(r) {
      var sc   = 'p-badge st-' + (r.status || 'FOR_PLOTTING');
      var unit = (r.unit || 'ft').toUpperCase();
      var size = (r.width && r.height)
        ? r.width + ' × ' + r.height + ' ' + unit
          + (r.unit && r.unit.toLowerCase() !== 'ft' && r.widthFt ? ' (' + r.widthFt + ' × ' + r.heightFt + ' ft)' : '')
        : '—';

      var action = '';
      if (r.status === 'FOR_PLOTTING') {
        action = '<button class="jo-action-btn jo-btn-plot" onclick="switchTab(\'plotting\')">✦ Plot</button>';
      } else if (r.status === 'READY_TO_PRINT') {
        action = '<button class="jo-action-btn jo-btn-printing" onclick="jo_updateStatus(\'' + jo_esc(r.joNumber) + '\',\'PRINTING\',this)">▶ Mark Printing</button>';
      } else if (r.status === 'PRINTING') {
        action = '<button class="jo-action-btn jo-btn-completed" onclick="jo_updateStatus(\'' + jo_esc(r.joNumber) + '\',\'COMPLETED\',this)">✓ Done</button>';
      }
      if (r.plottingImageUrl) {
        action = '<button class="jo-action-btn jo-btn-view" onclick="window.open(\'' + jo_esc(r.plottingImageUrl) + '\',\'_blank\')" style="margin-right:4px;">🖼</button>' + action;
      }

      h += '<tr>'
        + '<td><span class="jo-num">' + jo_esc(r.joNumber) + '</span></td>'
        + '<td style="font-weight:600;max-width:140px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">' + jo_esc(r.customer) + '</td>'
        + '<td style="max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--p-muted);font-size:11px;">' + jo_esc(r.jobDescription||'—') + '</td>'
        + '<td style="font-size:11px;white-space:nowrap;">' + size + '</td>'
        + '<td><span class="p-badge ' + sc + '">' + jo_esc(r.status||'FOR_PLOTTING') + '</span></td>'
        + '<td>' + jo_renderRolls(r.rollId) + '</td>'
        + '<td style="font-size:11px;color:var(--p-faint);white-space:nowrap;">' + jo_esc(r.dateCreated) + '</td>'
        + '<td style="white-space:nowrap;">' + action + '</td>'
        + '</tr>';
    });
  }
  tb.innerHTML = h;
}

function jo_renderRolls(rollId) {
  if (!rollId || !rollId.trim()) return '<span style="color:var(--p-faint);">—</span>';
  return rollId.split(',').map(function(id){
    id = id.trim();
    return id ? '<span class="jo-roll" style="margin-right:3px;">' + jo_esc(id) + '</span>' : '';
  }).join('');
}

function jo_updateStatus(joNumber, newStatus, btn) {
  btn.disabled = true;
  btn.textContent = '…';
  google.script.run
    .withSuccessHandler(function(r) {
      if (r.success) {
        for (var i = 0; i < jo_all.length; i++) {
          if (jo_all[i].joNumber === joNumber) { jo_all[i].status = newStatus; break; }
        }
        jo_apply();
        prism_toast('success', joNumber + ' → ' + newStatus.replace(/_/g,' '));
      } else {
        btn.disabled = false; btn.textContent = newStatus === 'PRINTING' ? '▶ Mark Printing' : '✓ Done';
        prism_toast('error', r.message);
      }
    })
    .withFailureHandler(function(e) {
      btn.disabled = false; btn.textContent = '…';
      prism_toast('error', e.message);
    })
    .prism_updateJOStatus(joNumber, newStatus);
}

function jo_renderPagination() {
  var total = Math.ceil(jo_filtered.length / jo_pageSize);
  var el    = document.getElementById('jo-pagination-row');
  if (total <= 1) { el.innerHTML = ''; return; }
  var h = '';
  h += '<button class="p-page-btn" onclick="jo_goPage(jo_page-1)" ' + (jo_page<=1?'disabled':'') + '>‹</button>';
  var s = Math.max(1, jo_page-2), e = Math.min(total, jo_page+2);
  if (s>1) h += '<button class="p-page-btn" onclick="jo_goPage(1)">1</button>' + (s>2?'<span style="padding:0 4px;color:var(--p-faint);">…</span>':'');
  for (var i=s;i<=e;i++) h += '<button class="p-page-btn'+(i===jo_page?' active':'')+'" onclick="jo_goPage('+i+')">'+i+'</button>';
  if (e<total) h += (e<total-1?'<span style="padding:0 4px;color:var(--p-faint);">…</span>':'') + '<button class="p-page-btn" onclick="jo_goPage('+total+')">'+total+'</button>';
  h += '<button class="p-page-btn" onclick="jo_goPage(jo_page+1)" ' + (jo_page>=total?'disabled':'') + '>›</button>';
  h += '<span style="font-size:12px;color:var(--p-faint);font-weight:600;margin-left:4px;">Page ' + jo_page + ' of ' + total + '</span>';
  el.innerHTML = h;
}

function jo_goPage(p) {
  var total = Math.ceil(jo_filtered.length / jo_pageSize);
  if (p<1||p>total) return;
  jo_page = p;
  jo_renderPage();
  jo_renderPagination();
  document.getElementById('jo-table-wrap').scrollTop = 0;
}

function jo_esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
</script>
