<!-- PRISMMaterials.html v4 — Search, pagination, reload, unified design -->
<style>
  #tab-materials, #tab-materials * { color: var(--p-text); }
  .m4-row:hover td { background: #fefce8 !important; }

  /* Stock combo */
  .m4-combo-wrap { position: relative; }
  .m4-combo-dropdown {
    position: absolute; left: 0; right: 0; top: calc(100% + 4px);
    background: var(--p-surface); border: 1px solid var(--p-border); border-radius: 11px;
    box-shadow: var(--p-shadow-md); z-index: 200;
    max-height: 220px; overflow-y: auto; display: none;
  }
  .m4-combo-dropdown.open { display: block; }
  .m4-combo-opt {
    padding: 10px 14px; font-size: 13px; cursor: pointer;
    border-bottom: 1px solid #f3f4f6; transition: background .1s;
    display: flex; align-items: baseline; gap: 6px;
  }
  .m4-combo-opt:last-child { border-bottom: none; }
  .m4-combo-opt:hover { background: var(--p-amber-lt); }
  .m4-combo-opt .opt-code { font-weight: 700; color: var(--p-amber); font-family: 'JetBrains Mono', monospace; font-size: 12px; }
  .m4-combo-opt .opt-name { color: var(--p-muted); font-size: 12px; }

  /* Add form panel */
  #m4-addPanel {
    display: none;
    background: var(--p-surface);
    border: 1.5px solid var(--p-amber-bd);
    border-radius: var(--p-radius);
    padding: 18px;
    margin-bottom: 16px;
    box-shadow: var(--p-shadow);
  }

  /* Selected pill */
  .m4-pill {
    display: inline-flex; align-items: center; gap: 8px;
    background: var(--p-amber-lt); border: 1px solid var(--p-amber-bd);
    border-radius: 9999px; padding: 4px 12px 4px 10px;
    font-size: 12px; margin-top: 6px;
  }
  .m4-pill .pill-code { font-weight: 700; color: var(--p-amber); font-family: 'JetBrains Mono', monospace; }
  .m4-pill .pill-name { color: var(--p-muted); }
  .m4-pill .pill-x { color: var(--p-faint); background: none; border: none; cursor: pointer; font-size: 14px; line-height: 1; padding: 0; }
  .m4-pill .pill-x:hover { color: var(--p-red); }
</style>

<div style="padding:20px 20px 40px;">

  <!-- Page header -->
  <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:20px;">
    <div>
      <h2 style="font-size:20px;font-weight:800;letter-spacing:-.02em;margin:0 0 3px;">Materials</h2>
      <p style="font-size:13px;color:var(--p-muted);margin:0;">LFP substrate catalog</p>
    </div>
    <div style="display:flex;gap:8px;align-items:center;">
      <button id="m4-reloadBtn" class="p-btn-reload" onclick="m4_reload()">
        <svg width="13" height="13" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5"
            d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/>
        </svg>
        Reload
      </button>
      <button onclick="m4_toggleForm()" id="m4-addBtn" class="p-btn p-btn-amber">
        <svg width="13" height="13" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 4v16m8-8H4"/>
        </svg>
        Add Material
      </button>
    </div>
  </div>

  <!-- Add panel -->
  <div id="m4-addPanel">
    <p class="p-section-title">New LFP Material</p>

    <div style="margin-bottom:14px;">
      <label class="p-label">Select Stock Item <span style="color:var(--p-red);">*</span></label>
      <div class="m4-combo-wrap" id="m4-comboWrap">
        <div style="display:flex;align-items:center;border:1.5px solid var(--p-border);border-radius:10px;background:var(--p-surface);overflow:hidden;transition:border-color .15s,box-shadow .15s;" id="m4-comboRow">
          <span style="padding:0 10px 0 12px;color:var(--p-faint);flex-shrink:0;pointer-events:none;">
            <svg width="13" height="13" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-4.35-4.35M17 11A6 6 0 1 1 5 11a6 6 0 0 1 12 0z"/>
            </svg>
          </span>
          <input type="text" id="m4-stockSearch" placeholder="Search by item code or description…"
            autocomplete="off"
            style="flex:1;border:none;outline:none;background:transparent;padding:10px 4px;font-size:13px;color:var(--p-text);min-width:0;font-family:'DM Sans',sans-serif;"
            oninput="m4_filterStock()" onfocus="m4_openCombo()">
          <button id="m4-comboClear" onclick="m4_clearSel()"
            style="padding:0 12px;color:var(--p-faint);background:none;border:none;cursor:pointer;font-size:15px;display:none;">✕</button>
        </div>
        <div class="m4-combo-dropdown" id="m4-comboDropdown"></div>
      </div>
      <div id="m4-selectedPill" style="display:none;"></div>
      <input type="hidden" id="m4-code">
      <input type="hidden" id="m4-name">
    </div>

    <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:12px;">
      <div>
        <label class="p-label">Width (ft) <span style="color:var(--p-red);">*</span></label>
        <input type="number" id="m4-width" class="p-input" min="0.1" step="0.1" placeholder="10.5">
      </div>
      <div>
        <label class="p-label">Std Length (ft) <span style="color:var(--p-red);">*</span></label>
        <input type="number" id="m4-len" class="p-input" min="1" step="1" placeholder="164">
      </div>
      <div>
        <label class="p-label">Cost / Roll (₱)</label>
        <input type="number" id="m4-cost" class="p-input" min="0" step="1" placeholder="0">
      </div>
    </div>
    <div style="margin-bottom:14px;">
      <label class="p-label">Supplier</label>
      <input type="text" id="m4-supplier" class="p-input" placeholder="Supplier name…">
    </div>
    <div style="display:flex;gap:8px;">
      <button id="m4-saveBtn" onclick="m4_save()" class="p-btn p-btn-amber" style="flex:1;">Save Material</button>
      <button onclick="m4_toggleForm()" class="p-btn p-btn-ghost">Cancel</button>
    </div>
  </div>

  <!-- Search + count -->
  <div style="display:flex;gap:10px;align-items:center;margin-bottom:12px;flex-wrap:wrap;">
    <div class="p-search-wrap" style="flex:1;min-width:180px;">
      <span class="icon">
        <svg width="14" height="14" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-4.35-4.35M17 11A6 6 0 1 1 5 11a6 6 0 0 1 12 0z"/>
        </svg>
      </span>
      <input type="text" id="m4-search" class="p-input" placeholder="Search code or name…" oninput="m4_applyFilter()">
    </div>
    <p id="m4-count" style="font-size:12px;color:var(--p-faint);font-weight:600;white-space:nowrap;margin:0;"></p>
  </div>

  <!-- Loading skeleton -->
  <div id="m4-loading" class="p-card" style="padding:40px;text-align:center;display:none;">
    <svg class="p-spin" style="width:20px;height:20px;margin:0 auto 8px;display:block;color:var(--p-amber);" fill="none" viewBox="0 0 24 24">
      <circle style="opacity:.25;" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/>
      <path style="opacity:.75;" fill="currentColor" d="M4 12a8 8 0 018-8v8z"/>
    </svg>
    <p style="font-size:13px;color:var(--p-faint);">Loading materials…</p>
  </div>

  <!-- Desktop table -->
  <div id="m4-tableWrap" class="p-card" style="display:none;overflow:hidden;">
    <div style="overflow-x:auto;">
      <table class="p-table" style="min-width:600px;">
        <thead>
          <tr>
            <th>Code</th>
            <th>Material Name</th>
            <th>Width</th>
            <th>Std Length</th>
            <th>Supplier</th>
            <th>Cost / Roll</th>
          </tr>
        </thead>
        <tbody id="m4-tbody">
          <tr><td colspan="6" style="text-align:center;padding:40px;color:var(--p-faint);">No materials yet.</td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <!-- Mobile cards -->
  <div id="m4-cards" style="display:none;" class="space-y-3"></div>

  <!-- Pagination -->
  <div id="m4-pagination" style="display:flex;align-items:center;gap:6px;margin-top:14px;flex-wrap:wrap;"></div>

</div>

<script>
var m4_formOpen = false;
var m4_stockItems = [], m4_allMats = [], m4_filteredMats = [];
var m4_selCode = '', m4_selName = '';
var m4_page = 1, m4_pageSize = 15;

/* ── Init ── */
function prism_init_materials() {
  m4_initLayout();
  m4_showLoading(true);

  google.script.run
    .withSuccessHandler(function(r) {
      if (r && r.success) m4_stockItems = r.data || [];
    })
    .withFailureHandler(function() {})
    .prism_getStockMaterialsList();

  m4_loadMaterials();
}

function m4_reload() {
  prism_setReloading('m4-reloadBtn', true);
  m4_loadMaterials();
}

function m4_loadMaterials() {
  google.script.run
    .withSuccessHandler(function(r) {
      prism_setReloading('m4-reloadBtn', false);
      m4_showLoading(false);
      m4_initLayout();
      if (r && r.success) {
        m4_allMats = r.data || [];
        m4_page = 1;
        m4_applyFilter();
      } else {
        m4_error((r && r.message) || 'Failed to load.');
      }
    })
    .withFailureHandler(function(e) {
      prism_setReloading('m4-reloadBtn', false);
      m4_showLoading(false);
      m4_initLayout();
      m4_error(e.message);
    })
    .prism_getAllMaterialsPublic();
}

function m4_showLoading(v) {
  document.getElementById('m4-loading').style.display = v ? 'block' : 'none';
  if (v) {
    document.getElementById('m4-tableWrap').style.display = 'none';
    document.getElementById('m4-cards').style.display = 'none';
  }
}

function m4_initLayout() {
  var mob = window.innerWidth < 640;
  document.getElementById('m4-tableWrap').style.display = mob ? 'none' : 'block';
  document.getElementById('m4-cards').style.display     = mob ? 'block' : 'none';
}
window.addEventListener('resize', m4_initLayout);

function m4_applyFilter() {
  var q = (document.getElementById('m4-search').value || '').trim().toLowerCase();
  m4_filteredMats = m4_allMats.filter(function(m) {
    return !q || (m.materialCode + ' ' + m.materialName).toLowerCase().indexOf(q) !== -1;
  });
  document.getElementById('m4-count').textContent =
    m4_filteredMats.length + ' material' + (m4_filteredMats.length !== 1 ? 's' : '');
  m4_renderPage();
  m4_renderPagination();
}

function m4_renderPage() {
  var start = (m4_page - 1) * m4_pageSize;
  var slice = m4_filteredMats.slice(start, start + m4_pageSize);
  m4_renderTable(slice);
  m4_renderCards(slice);
}

function m4_renderPagination() {
  var total = Math.ceil(m4_filteredMats.length / m4_pageSize);
  var el = document.getElementById('m4-pagination');
  if (total <= 1) { el.innerHTML = ''; return; }
  var h = '';
  h += '<button class="p-page-btn" onclick="m4_goPage(m4_page-1)" ' + (m4_page <= 1 ? 'disabled' : '') + '>‹</button>';
  for (var i = 1; i <= total; i++) {
    if (total <= 7 || i === 1 || i === total || Math.abs(i - m4_page) <= 1) {
      h += '<button class="p-page-btn' + (i === m4_page ? ' active' : '') + '" onclick="m4_goPage(' + i + ')">' + i + '</button>';
    } else if (Math.abs(i - m4_page) === 2) {
      h += '<span style="padding:0 4px;color:var(--p-faint);">…</span>';
    }
  }
  h += '<button class="p-page-btn" onclick="m4_goPage(m4_page+1)" ' + (m4_page >= total ? 'disabled' : '') + '>›</button>';
  h += '<span style="font-size:12px;color:var(--p-faint);font-weight:600;margin-left:4px;">Page ' + m4_page + ' of ' + total + '</span>';
  el.innerHTML = h;
}

function m4_goPage(p) {
  var total = Math.ceil(m4_filteredMats.length / m4_pageSize);
  if (p < 1 || p > total) return;
  m4_page = p;
  m4_renderPage();
  m4_renderPagination();
}

function m4_renderTable(data) {
  var tb = document.getElementById('m4-tbody');
  if (!data.length) {
    tb.innerHTML = '<tr><td colspan="6" style="text-align:center;padding:40px;color:var(--p-faint);">No materials found.</td></tr>';
    return;
  }
  var h = '';
  data.forEach(function(m) {
    h += '<tr class="m4-row">'
      + '<td><span class="mono" style="font-weight:700;font-size:12px;color:var(--p-amber);">' + m4_esc(m.materialCode) + '</span></td>'
      + '<td style="font-weight:600;">' + m4_esc(m.materialName) + '</td>'
      + '<td style="color:var(--p-muted);">' + m.width + ' ft</td>'
      + '<td style="color:var(--p-muted);">' + m.standardLength + ' ft</td>'
      + '<td style="color:var(--p-muted);font-size:12px;">' + m4_esc(m.supplier || '—') + '</td>'
      + '<td style="font-weight:600;color:var(--p-green);">' + (m.costPerRoll ? '₱' + Number(m.costPerRoll).toLocaleString() : '—') + '</td>'
      + '</tr>';
  });
  tb.innerHTML = h;
}

function m4_renderCards(data) {
  var el = document.getElementById('m4-cards');
  if (!data.length) {
    el.innerHTML = '<div class="p-card" style="padding:32px;text-align:center;color:var(--p-faint);font-size:13px;">No materials found.</div>';
    return;
  }
  var h = '';
  data.forEach(function(m) {
    h += '<div class="p-card" style="padding:14px;">'
      + '<div style="display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:6px;">'
      + '<span class="mono" style="font-weight:700;font-size:13px;color:var(--p-amber);">' + m4_esc(m.materialCode) + '</span>'
      + (m.costPerRoll ? '<span style="font-weight:700;color:var(--p-green);font-size:13px;">₱' + Number(m.costPerRoll).toLocaleString() + '</span>' : '')
      + '</div>'
      + '<p style="font-weight:600;font-size:14px;margin:0 0 8px;">' + m4_esc(m.materialName) + '</p>'
      + '<div style="display:flex;flex-wrap:wrap;gap:10px;font-size:12px;color:var(--p-muted);">'
      + '<span>Width: <strong style="color:var(--p-text);">' + m.width + ' ft</strong></span>'
      + '<span>Length: <strong style="color:var(--p-text);">' + m.standardLength + ' ft</strong></span>'
      + (m.supplier ? '<span>Supplier: <strong style="color:var(--p-text);">' + m4_esc(m.supplier) + '</strong></span>' : '')
      + '</div>'
      + '</div>';
  });
  el.innerHTML = h;
}

/* ── Toggle add form ── */
function m4_toggleForm() {
  m4_formOpen = !m4_formOpen;
  document.getElementById('m4-addPanel').style.display = m4_formOpen ? 'block' : 'none';
  var btn = document.getElementById('m4-addBtn');
  btn.innerHTML = m4_formOpen
    ? '<svg width="12" height="12" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M6 18L18 6M6 6l12 12"/></svg> Cancel'
    : '<svg width="12" height="12" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 4v16m8-8H4"/></svg> Add Material';
  if (!m4_formOpen) m4_resetForm();
}

function m4_resetForm() {
  m4_clearSel();
  ['m4-width','m4-len','m4-cost','m4-supplier'].forEach(function(id) { document.getElementById(id).value = ''; });
}

/* ── Stock combo ── */
function m4_openCombo() {
  m4_renderCombo(m4_stockItems);
  document.getElementById('m4-comboDropdown').classList.add('open');
  document.getElementById('m4-comboRow').style.borderColor = 'var(--p-amber)';
  document.getElementById('m4-comboRow').style.boxShadow   = '0 0 0 3px rgba(202,138,4,.12)';
}
function m4_filterStock() {
  var q = (document.getElementById('m4-stockSearch').value || '').trim().toLowerCase();
  var filtered = m4_stockItems.filter(function(i) {
    return !q || (i.itemCode + ' ' + i.itemDesc).toLowerCase().indexOf(q) !== -1;
  });
  m4_renderCombo(filtered);
  document.getElementById('m4-comboDropdown').classList.add('open');
  if (m4_selCode) { m4_selCode = ''; m4_selName = ''; document.getElementById('m4-selectedPill').style.display = 'none'; document.getElementById('m4-comboClear').style.display = 'none'; }
}
function m4_renderCombo(items) {
  var dd = document.getElementById('m4-comboDropdown');
  if (!items.length) {
    dd.innerHTML = '<div class="m4-combo-opt" style="color:var(--p-faint);cursor:default;">No items found.</div>';
    return;
  }
  dd.innerHTML = items.map(function(i) {
    return '<div class="m4-combo-opt" onmousedown="m4_selStock(\'' + m4_esc(i.itemCode).replace(/'/g,"\\'") + '\',\'' + m4_esc(i.itemDesc).replace(/'/g,"\\'") + '\')">'
      + '<span class="opt-code">' + m4_esc(i.itemCode) + '</span>'
      + '<span class="opt-name">' + m4_esc(i.itemDesc) + '</span>'
      + '</div>';
  }).join('');
}
function m4_selStock(code, name) {
  m4_selCode = code; m4_selName = name;
  document.getElementById('m4-code').value = code;
  document.getElementById('m4-name').value = name;
  document.getElementById('m4-stockSearch').value = code + ' — ' + name;
  document.getElementById('m4-comboClear').style.display = 'block';
  document.getElementById('m4-comboDropdown').classList.remove('open');
  document.getElementById('m4-comboRow').style.borderColor = 'var(--p-border)';
  document.getElementById('m4-comboRow').style.boxShadow = 'none';
  document.getElementById('m4-selectedPill').style.display = 'block';
  document.getElementById('m4-selectedPill').innerHTML =
    '<div class="m4-pill"><svg width="11" height="11" fill="none" stroke="var(--p-amber)" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M5 13l4 4L19 7"/></svg>'
    + '<span class="pill-code">' + m4_esc(code) + '</span>'
    + '<span class="pill-name">' + m4_esc(name) + '</span>'
    + '<button class="pill-x" onclick="m4_clearSel()">✕</button></div>';
}
function m4_clearSel() {
  m4_selCode = ''; m4_selName = '';
  document.getElementById('m4-code').value = '';
  document.getElementById('m4-name').value = '';
  document.getElementById('m4-stockSearch').value = '';
  document.getElementById('m4-comboClear').style.display = 'none';
  document.getElementById('m4-selectedPill').style.display = 'none';
  document.getElementById('m4-comboDropdown').classList.remove('open');
}
document.addEventListener('mousedown', function(e) {
  var wrap = document.getElementById('m4-comboWrap');
  var dd   = document.getElementById('m4-comboDropdown');
  if (wrap && dd && !wrap.contains(e.target)) {
    dd.classList.remove('open');
    var row = document.getElementById('m4-comboRow');
    if (row) { row.style.borderColor = 'var(--p-border)'; row.style.boxShadow = 'none'; }
  }
});

/* ── Save ── */
function m4_save() {
  var code = document.getElementById('m4-code').value.trim();
  var name = document.getElementById('m4-name').value.trim();
  var w    = parseFloat(document.getElementById('m4-width').value) || 0;
  var l    = parseFloat(document.getElementById('m4-len').value)   || 0;
  if (!code || !name) { prism_toast('error', 'Please select a stock item.'); return; }
  if (!w) { prism_toast('error', 'Width is required.'); return; }
  if (!l) { prism_toast('error', 'Standard Length is required.'); return; }
  var btn = document.getElementById('m4-saveBtn');
  btn.disabled = true; btn.textContent = 'Saving…';
  google.script.run
    .withSuccessHandler(function(r) {
      btn.disabled = false; btn.textContent = 'Save Material';
      if (r.success) { prism_toast('success', r.message); m4_toggleForm(); m4_loadMaterials(); }
      else prism_toast('error', r.message);
    })
    .withFailureHandler(function(e) { btn.disabled = false; btn.textContent = 'Save Material'; prism_toast('error', e.message); })
    .prism_addMaterial({ materialCode: code, materialName: name, width: w, standardLength: l,
      costPerRoll: parseFloat(document.getElementById('m4-cost').value) || 0,
      supplier: document.getElementById('m4-supplier').value.trim() });
}

function m4_error(msg) {
  document.getElementById('m4-tbody').innerHTML =
    '<tr><td colspan="6" style="text-align:center;padding:40px;color:var(--p-red);">Error: ' + m4_esc(msg) + '</td></tr>';
}
function m4_esc(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
</script>
