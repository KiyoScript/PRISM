<!-- PRISMRollMap.html -->

<style>
  #tab-roll-map,
  #tab-roll-map * {
    box-sizing: border-box;
    font-family: 'DM Sans', sans-serif;
  }
  
  .rm-layout {
    display: flex;
    flex-wrap: nowrap;
    gap: 20px;
    height: calc(100vh - 40px);
    margin: -10px;
    padding: 10px;
  }
  
  /* LEFT PANEL */
  .rm-left { width: 420px;
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    gap: 14px;
    height: 100%;
    overflow-y: auto;
  }
  
  .rm-roll-card {
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 13px; border-radius: 10px; cursor: pointer;
      border: 1.5px solid var(--p-border); background: var(--p-surface);
      margin-bottom: 7px; transition: all .15s;
    }
    .rm-roll-card:hover { border-color: var(--p-green-bd); background: var(--p-green-lt); }
    .rm-roll-card.active { border-color: var(--p-green); background: var(--p-green-lt); }
    .rm-roll-id { font-family: 'JetBrains Mono', monospace; font-size: 13px; font-weight: 700; color: var(--p-text); margin-bottom: 2px; }
    .rm-roll-meta { font-size: 11px; color: var(--p-muted); margin-top: 2px; }
  .rm-filter-btn {
    padding: 6px 12px;
    border: 1px solid var(--p-border);
    border-radius: 20px;
    font-size: 11px;
    font-weight: 700;
    background: var(--p-surface);
    color: var(--p-muted);
    cursor: pointer;
    transition: all 0.2s;
  }
  .rm-filter-btn:hover { background: var(--p-bg); }
  .rm-filter-btn.active {
    background: var(--p-indigo);
    color: #fff;
    border-color: var(--p-indigo);
  }
  
  /* RIGHT PANEL */
  .rm-right {
    flex: 1;
    min-width: 0;
    display: flex;
    flex-direction: column;
    height: 100%;
    background: var(--p-surface);
    border: 1px solid var(--p-border);
    border-radius: 12px;
    overflow: hidden;
  }
  
  .rm-map-header {
    padding: 16px;
    border-bottom: 1px solid var(--p-border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: #fff;
    z-index: 10;
  }
  
  .rm-map-body {
    flex: 1;
    overflow-y: auto;
    overflow-x: auto;
    padding: 20px;
    display: flex;
    justify-content: center;
    background: var(--p-bg);
  }
  
  .rm-timeline-wrap {
    display: flex;
    position: relative;
    max-width: 1000px;
    margin: 0 auto;
  }
</style>

<div class="rm-layout">

  <!-- LEFT: Roll List -->
  <div class="rm-left">
    <div style="margin-bottom:6px;">
      <h2 style="margin:0 0 10px;font-size:18px;font-weight:800;color:var(--p-text);">Physical Roll Maps</h2>
      
      <div style="position:relative;margin-bottom:12px;">
        <span style="position:absolute;left:10px;top:9px;color:var(--p-faint);">
          <svg width="15" height="15" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-4.35-4.35M17 11A6 6 0 1 1 5 11a6 6 0 0 1 12 0z"/></svg>
        </span>
        <input type="text" id="rm-search" class="p-input" placeholder="Search Material or Roll ID..." oninput="rm_applyFilter()" style="padding-left:32px;">
      </div>
      
      <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px;" id="rm-filters">
        <button class="rm-filter-btn" data-f="OPEN" onclick="rm_setFilter('OPEN')">Open</button>
        <button class="rm-filter-btn" data-f="CONSUMED" onclick="rm_setFilter('CONSUMED')">Consumed</button>
        <button class="rm-filter-btn active" data-f="ALL" onclick="rm_setFilter('ALL')">All Used</button>
      </div>
      
      <div id="rm-count" style="font-size:11px;font-weight:700;color:var(--p-muted);"></div>
    </div>
    
    <div id="rm-rollList" style="display:flex;flex-direction:column;gap:10px;padding-bottom:20px;">
      <div class="pp-empty">Loading rolls...</div>
    </div>
  </div>
  
  <!-- RIGHT: Map Preview -->
  <div class="rm-right">
    
    <div id="rm-rightEmpty" style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;color:var(--p-faint);">
      <svg width="60" height="60" fill="none" stroke="currentColor" viewBox="0 0 24 24" style="margin-bottom:16px;">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1" d="M9 20l-5.447-2.724A1 1 0 013 16.382V5.618a1 1 0 011.447-.894L9 7m0 13l6-3m-6 3V7m6 10l4.553 2.276A1 1 0 0021 18.382V7.618a1 1 0 00-.553-.894L16 4m0 13V4m0 0L9 7"/>
      </svg>
      <div style="font-size:18px;font-weight:800;color:var(--p-text);margin-bottom:8px;">No roll selected</div>
      <div style="font-size:14px;max-width:320px;text-align:center;color:var(--p-muted);">Select any roll from the list to view its exact 1:1 physical layout history.</div>
    </div>
    
    <div id="rm-results" style="display:none;height:100%;flex-direction:column;">
      <div class="rm-map-header">
        <div>
          <div id="rm-mapTitle" style="font-size:16px;font-weight:800;color:var(--p-text);margin-bottom:2px;">PMT-000-R00</div>
          <div id="rm-mapSub" style="font-size:12px;font-weight:600;color:var(--p-muted);">10.5ft &times; 164ft</div>
        </div>
        <div>
          <button id="rm-refreshBtn" onclick="rm_fetchMap()" class="p-btn p-btn-ghost" style="padding:6px 12px;font-size:12px;">&#8635; Refresh Map</button>
        </div>
      </div>
      
      <div class="rm-map-body">
        <div class="rm-timeline-wrap" id="rm-mapWrap">
          <canvas id="rm-mapCanvas"></canvas>
          <!-- Ruler overlay -->
        </div>
      </div>
    </div>
    
  </div>
</div>

<script>
var rm_rolls = [];
var rm_materials = [];
var rm_filter = 'ALL';
var rm_selRollId = '';
var rm_layoutData = null; // map data from server
var rm_colors = {};

function rm_init() {
  document.getElementById('rm-rollList').innerHTML = '<div class="pp-empty">Loading records...</div>';
  google.script.run
    .withSuccessHandler(function(r) {
      if (r && r.success) {
        rm_materials = r.materials || [];
        rm_rolls = r.rolls || [];
        rm_applyFilter();
      }
    })
    .withFailureHandler(function(){})
    .prism_getInitData();
}

function rm_setFilter(f) {
  rm_filter = f;
  var btns = document.querySelectorAll('.rm-filter-btn');
  btns.forEach(function(b) {
    if (b.getAttribute('data-f') === f) b.classList.add('active');
    else b.classList.remove('active');
  });
  rm_applyFilter();
}

function rm_applyFilter() {
  var q = (document.getElementById('rm-search').value || '').trim().toLowerCase();
  
  var filtered = rm_rolls.filter(function(r) {
    if (r.status === 'UNOPENED') return false; // Never show unopened
    
    // Default open rolls, consumed, or both based on filter
    if (rm_filter !== 'ALL' && r.status !== rm_filter) return false;
    
    if (q) {
      var matMatch = false;
      for(var i=0; i<rm_materials.length; i++){
        if (rm_materials[i].materialCode === r.materialCode && (rm_materials[i].materialName||'').toLowerCase().indexOf(q) !== -1) { matMatch = true; break; }
      }
      var rMatch = r.rollId.toLowerCase().indexOf(q) !== -1;
      if (!matMatch && !rMatch) return false;
    }
    return true;
  });
  
  // Sort: OPEN rolls first, then CONSUMED by date
  filtered.sort(function(a, b) {
    if (a.status === 'OPEN' && b.status !== 'OPEN') return -1;
    if (a.status !== 'OPEN' && b.status === 'OPEN') return 1;
    return a.rollId.localeCompare(b.rollId);
  });
  
  var el = document.getElementById('rm-rollList');
  if (!filtered.length) {
    el.innerHTML = '<div class="pp-empty">No rolls found.</div>';
    document.getElementById('rm-count').textContent = '0 rolls';
    return;
  }
  
  document.getElementById('rm-count').textContent = filtered.length + ' rolls';
  
  var h = '';
  filtered.forEach(function(r) {
    var sel = (rm_selRollId === r.rollId) ? ' active' : '';
    
    var matName = r.materialCode;
    for(var i=0; i<rm_materials.length; i++){
      if(rm_materials[i].materialCode === r.materialCode) { matName = rm_materials[i].materialName; break; }
    }
    var matClean = matName.replace(/\s+\d[\d.]*\s*(?:ft|FT|Ft).*$/i, '').trim();
      var orig = r.originalLength || 1;
      var rem = r.remainingLength || 0;
      var pct = Math.max(0, Math.round((rem/orig)*100));
      var bc = pct > 20 ? 'var(--p-green)' : (pct > 5 ? 'var(--p-orange)' : 'var(--p-red)');
      
      h += '<div class="rm-roll-card' + sel + '" onclick="rm_selectRoll(\'' + pp_esc(r.rollId) + '\')">'
        + '<div>'
        + (matClean ? '<div style="font-size:12px;font-weight:700;color:var(--p-text);margin-bottom:2px;">' + pp_esc(matClean) + '</div>' : '')
        + '<div class="rm-roll-id">' + pp_esc(r.rollId) + '</div>'
        + '<div class="rm-roll-meta">' + pp_esc(r.materialCode) + ' &middot; ' + r.width + 'ft wide</div>'
        + '</div>'
        + '<div style="text-align:right;">'
        + '<div style="font-size:13px;font-weight:800;color:' + bc + ';">' + pct + '%</div>'
        + '<div style="font-size:10px;color:var(--p-faint);">remaining</div>'
        + '</div>'
        + '</div>';
    });
  el.innerHTML = h;
}

function rm_selectRoll(id) {
  rm_selRollId = id;
  rm_applyFilter();
  rm_fetchMap();
}

function rm_fetchMap() {
  if (!rm_selRollId) return;
  
  document.getElementById('rm-rightEmpty').style.display = 'none';
  document.getElementById('rm-results').style.display = 'flex';
  
  var rObj = rm_rolls.find(function(x){ return x.rollId === rm_selRollId; });
  if (rObj) {
    var matName = rObj.materialCode;
    for(var i=0; i<rm_materials.length; i++){
      if(rm_materials[i].materialCode === rObj.materialCode) { matName = rm_materials[i].materialName; break; }
    }
    document.getElementById('rm-mapTitle').textContent = rObj.rollId;
    document.getElementById('rm-mapSub').innerHTML = (matName || rObj.materialCode) + ' &middot; ' + rObj.width + 'ft';
  }
  
  var canvas = document.getElementById('rm-mapCanvas');
  var ctx = canvas.getContext('2d');
  canvas.width = 400; canvas.height = 100;
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.fillStyle = '#9ca3af'; ctx.font = '13px DM Sans, sans-serif';
  ctx.fillText('Fetching layout data...', 10, 30);
  
  var btn = document.getElementById('rm-refreshBtn');
  btn.disabled = true; btn.textContent = 'Fetching...';
  
  google.script.run
    .withSuccessHandler(function(res) {
      btn.disabled = false; btn.textContent = 'â†º Refresh';
      if (res && res.success && res.data && res.data[rm_selRollId]) {
        rm_layoutData = res.data[rm_selRollId];
        rm_drawCanvas();
      } else {
        rm_layoutData = [];
        rm_drawCanvas();
      }
    })
    .withFailureHandler(function(){
      btn.disabled = false; btn.textContent = 'â†º Refresh';
    })
    .prism_getRollPlotHistoryMap([rm_selRollId]);
}

function rm_colorForHistoryJO(jo) {
  jo = String(jo||'').trim().toUpperCase();
  if (!jo) return '#94a3b8';
  if (rm_colors[jo]) return rm_colors[jo];
  var hash = 0;
  for (var i = 0; i < jo.length; i++) hash = ((hash * 31) + jo.charCodeAt(i)) >>> 0;
  var PP_PALETTE = ['#f43f5e','#ec4899','#d946ef','#d1d5db','#a855f7','#8b5cf6','#6366f1','#8b5cf6','#3b82f6','#0ea5e9','#0ea5e9','#06b6d4','#06b6d4','#14b8a6','#10b981','#10b981','#22c55e','#10b981','#84cc16','#eab308','#eab308','#f59e0b','#f59e0b','#f97316','#f97316','#ef4444'];
  rm_colors[jo] = PP_PALETTE[hash % PP_PALETTE.length];
  return rm_colors[jo];
}

function rm_drawCanvas() {
  var canvas = document.getElementById('rm-mapCanvas');
  if (!canvas) return;
  var ctx = canvas.getContext('2d');
  
  if (!rm_layoutData || !rm_layoutData.length) {
    canvas.width = 600; canvas.height = 100;
    ctx.clearRect(0,0,canvas.width,canvas.height);
    ctx.fillStyle = '#6b7280'; ctx.font = '14px DM Sans, sans-serif';
    ctx.fillText('No history found for this roll.', 10, 40);
    return;
  }
  
  var rObj = rm_rolls.find(function(x){ return x.rollId === rm_selRollId; });
  var rollWidth = rObj ? (parseFloat(rObj.width) || 10.5) : 10.5;
  var rollLen = rObj ? parseFloat(rObj.originalLength) : 0;
  
  var maxFt = 0;
  rm_layoutData.forEach(function(seg) {
    if (seg.endAtFt > maxFt) maxFt = seg.endAtFt;
  });
  if (maxFt <= 0) maxFt = 10;
  if (!rollLen || rollLen <= 0) rollLen = Math.max(164, maxFt + 10);
  
  var pxPerFt = 50; 
  var rulerW = 50;
  var mapW = rollWidth * pxPerFt;
  var bodyW = rulerW + mapW;
  var totalH = rollLen * pxPerFt;
  
  canvas.width = bodyW;
  canvas.height = totalH;
  document.getElementById('rm-mapWrap').style.width = bodyW + 'px';
  document.getElementById('rm-mapWrap').style.margin = '0 auto';
  
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  
  // Ruler background
  ctx.fillStyle = '#f8fafc';
  ctx.fillRect(0, 0, rulerW, canvas.height);
  ctx.beginPath();
  ctx.moveTo(rulerW - 0.5, 0); ctx.lineTo(rulerW - 0.5, canvas.height);
  ctx.strokeStyle = '#e2e8f0'; ctx.lineWidth = 1;
  ctx.stroke();
  
  // Map background
  ctx.fillStyle = '#f1f5f9';
  ctx.fillRect(rulerW, 0, mapW, canvas.height);
  ctx.strokeStyle = '#cbd5e1';
  ctx.strokeRect(rulerW, 0, mapW, canvas.height);
  
  // Ruler ticks
  ctx.fillStyle = '#64748b';
  ctx.font = '11px "DM Sans", sans-serif';
  ctx.textAlign = 'right';
  ctx.textBaseline = 'middle';
  for (var f = 0; f <= rollLen; f++) {
    var y = f * pxPerFt;
    if (f % 5 === 0) {
      ctx.beginPath(); ctx.moveTo(rulerW - 20, y); ctx.lineTo(rulerW, y);
      ctx.strokeStyle = '#94a3b8'; ctx.stroke();
      if (y > 10) ctx.fillText(f + 'ft', rulerW - 25, y);
    } else {
      ctx.beginPath(); ctx.moveTo(rulerW - 10, y); ctx.lineTo(rulerW, y);
      ctx.strokeStyle = '#cbd5e1'; ctx.stroke();
    }
  }
  
  rm_layoutData.forEach(function(seg) {
    if (seg.isDamage) {
      var y0 = seg.startAtFt * pxPerFt;
      var y1 = seg.endAtFt * pxPerFt;
      ctx.fillStyle = 'rgba(239,68,68,0.15)'; 
      ctx.fillRect(rulerW, y0, mapW, y1 - y0);
      
      ctx.save();
      ctx.beginPath(); ctx.rect(rulerW, y0, mapW, y1 - y0); ctx.clip();
      ctx.strokeStyle = 'rgba(239,68,68,0.3)'; ctx.lineWidth = 3;
      for (var p = -mapW; p < (y1 - y0) + mapW; p += 20) {
        ctx.beginPath(); ctx.moveTo(rulerW, y0 + p); ctx.lineTo(rulerW + mapW, y0 + p + mapW); ctx.stroke();
      }
      ctx.restore();
      
      ctx.strokeStyle = '#ef4444'; ctx.lineWidth = 2; ctx.strokeRect(rulerW, y0, mapW, y1 - y0);
      ctx.fillStyle = '#b91c1c'; ctx.font = 'bold 14px "DM Sans"'; ctx.textAlign = 'center';
      ctx.fillText('DAMAGE DECLARATION / SPLICE (' + (seg.lengthUsed||0).toFixed(1) + 'ft)', rulerW + mapW/2, y0 + (y1-y0)/2);
      return;
    }
    
    if (seg.isTestPrint) {
      var y0 = seg.startAtFt * pxPerFt;
      var y1 = seg.endAtFt * pxPerFt;
      ctx.fillStyle = 'rgba(100,116,139,0.2)';
      ctx.fillRect(rulerW, y0, mapW, y1 - y0);
      ctx.strokeStyle = '#475569'; ctx.lineWidth = 1; ctx.strokeRect(rulerW, y0, mapW, y1 - y0);
      ctx.fillStyle = '#334155'; ctx.font = 'bold 13px "DM Sans"'; ctx.textAlign = 'center';
      ctx.fillText('TEST PRINT (' + (seg.lengthUsed||0).toFixed(1) + 'ft)', rulerW + mapW/2, y0 + 15);
      return;
    }
    
    var y0 = seg.startAtFt * pxPerFt;
    var rows = Array.isArray(seg.rows) ? seg.rows : [];
    var rowY = y0;
    
    rows.forEach(function(r) {
      var rowH_px = (parseFloat(r.rowH) || 0) * pxPerFt;
      if (rowH_px <= 0) return;
      var pieces = Array.isArray(r.pieces) ? r.pieces : [];
      pieces.forEach(function(p) {
        var dx = parseFloat(p.dx) || 0;
        var wPx = (parseFloat(p.w) || 0) * pxPerFt;
        var hPx = (parseFloat(p.h) || 0) * pxPerFt;
        var xPx = rulerW + (dx * pxPerFt);
        
        ctx.fillStyle = rm_colorForHistoryJO(p.jo);
        ctx.globalAlpha = 0.5; ctx.fillRect(xPx, rowY, wPx, hPx);
        ctx.globalAlpha = 1.0; ctx.strokeStyle = 'rgba(15,23,42,0.4)'; ctx.lineWidth = 1.5; ctx.strokeRect(xPx, rowY, wPx, hPx);
        
        ctx.fillStyle = '#0f172a';
        ctx.textAlign = 'left'; ctx.textBaseline = 'top';
        
        var fontSize = Math.min(14, Math.max(8, hPx * 0.4));
        if (hPx > 15 && wPx > 30) {
            ctx.font = 'bold ' + fontSize + 'px "DM Sans", sans-serif';
            ctx.fillText(p.jo || '', xPx + 5, rowY + 5);
        }
        if (hPx > 30 && wPx > 40) {
          ctx.font = '600 ' + (fontSize * 0.75) + 'px "DM Sans", sans-serif';
          ctx.fillStyle = '#334155';
          var dimStr = (parseFloat(p.w)||0).toFixed(1) + ' &times; ' + (parseFloat(p.h)||0).toFixed(1) + 'ft';
          ctx.fillText(dimStr, xPx + 5, rowY + 5 + fontSize + 4);
        }
      });
      
      var ux = rulerW + ((parseFloat(r.usedW) || 0) * pxPerFt);
      if (ux > rulerW && ux < rulerW+mapW) {
        ctx.beginPath(); ctx.moveTo(ux, rowY); ctx.lineTo(ux, rowY + rowH_px);
        ctx.strokeStyle = '#94a3b8'; ctx.setLineDash([4,4]); ctx.stroke(); ctx.setLineDash([]);
      }
      ctx.beginPath(); ctx.moveTo(rulerW, rowY + rowH_px); ctx.lineTo(rulerW + mapW, rowY + rowH_px);
      ctx.strokeStyle = '#cbd5e1'; ctx.lineWidth = 1; ctx.stroke();
      
      rowY += rowH_px;
    });
  });
}

function pp_esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

</script>
