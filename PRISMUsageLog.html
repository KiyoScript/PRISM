<!-- PRISMUsageLog.html -->
<style>
  #tab-usage-log,#tab-usage-log *{color:#111827!important;}
  .ul3-row:hover td{background:#fdf4ff!important;}
</style>
<div class="p-4 space-y-4">
  <div class="flex items-start justify-between gap-3">
    <div><h2 class="text-xl font-bold">Usage Log</h2><p class="text-sm mt-0.5" style="color:#6b7280;">All LFP_Usage entries</p></div>
    <button onclick="prism_init_usage_log()" class="px-3 py-2 rounded-xl text-sm font-semibold border" style="background:#fdf4ff;color:#7c3aed;border-color:#e9d5ff;">Reload</button>
  </div>
  <div class="relative"><div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none"><svg class="w-4 h-4" style="color:#9ca3af;" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-4.35-4.35M17 11A6 6 0 1 1 5 11a6 6 0 0 1 12 0z"/></svg></div>
    <input type="text" id="ul3-search" placeholder="Search JO number, Roll ID, operator…" class="w-full pl-9 pr-4 py-2.5 border border-gray-300 rounded-xl text-sm bg-white focus:outline-none" style="color:#111827;" oninput="ul3_apply()">
  </div>
  <p id="ul3-count" class="text-xs" style="color:#9ca3af;"></p>
  <div id="ul3-tableWrap" class="bg-white rounded-xl border border-gray-200 overflow-hidden" style="display:none;">
    <div class="overflow-x-auto">
      <table class="min-w-full divide-y divide-gray-100">
        <thead style="background:#fdf4ff;">
          <tr>
            <th class="px-4 py-3 text-left text-xs font-bold uppercase" style="color:#374151;">JO #</th>
            <th class="px-4 py-3 text-left text-xs font-bold uppercase" style="color:#374151;">Roll ID</th>
            <th class="px-4 py-3 text-left text-xs font-bold uppercase" style="color:#374151;">Width Used</th>
            <th class="px-4 py-3 text-left text-xs font-bold uppercase" style="color:#374151;">Length Used</th>
            <th class="px-4 py-3 text-left text-xs font-bold uppercase" style="color:#374151;">Operator</th>
            <th class="px-4 py-3 text-left text-xs font-bold uppercase" style="color:#374151;">Date</th>
            <th class="px-4 py-3 text-left text-xs font-bold uppercase" style="color:#374151;">Plotting</th>
          </tr>
        </thead>
        <tbody id="ul3-tbody" class="bg-white divide-y divide-gray-100">
          <tr><td colspan="7" class="px-5 py-12 text-center text-sm" style="color:#9ca3af;">Loading…</td></tr>
        </tbody>
      </table>
    </div>
  </div>
  <div id="ul3-cards" style="display:none;" class="space-y-3"></div>
</div>
<script>
var ul3_all=[];
function prism_init_usage_log(){
  document.getElementById('ul3-tableWrap').style.display='none';document.getElementById('ul3-cards').style.display='none';
  google.script.run
    .withSuccessHandler(function(r){if(r.success){ul3_all=r.data||[];ul3_initLayout();ul3_apply();}else ul3_err(r.message);})
    .withFailureHandler(function(e){ul3_err(e.message);})
    .prism_getUsageLog();
}
function ul3_initLayout(){var m=window.innerWidth<640;document.getElementById('ul3-tableWrap').style.display=m?'none':'block';document.getElementById('ul3-cards').style.display=m?'block':'none';}
window.addEventListener('resize',ul3_initLayout);
function ul3_apply(){
  var q=(document.getElementById('ul3-search').value||'').trim().toLowerCase();
  var f=ul3_all.filter(function(r){return !q||(r.joNumber+' '+r.rollId+' '+r.operator).toLowerCase().indexOf(q)!==-1;});
  ul3_renderTable(f);ul3_renderCards(f);
  document.getElementById('ul3-count').textContent=f.length+' entr'+(f.length!==1?'ies':'y');
}
function ul3_renderTable(data){
  var tb=document.getElementById('ul3-tbody');
  if(!data.length){tb.innerHTML='<tr><td colspan="7" class="px-5 py-12 text-center text-sm" style="color:#9ca3af;">No entries.</td></tr>';return;}
  var h='';
  data.forEach(function(r){
    var pl=r.plottingLink?'<a href="'+ul3_esc(r.plottingLink)+'" target="_blank" class="text-xs font-semibold" style="color:#7c3aed;text-decoration:underline;">View</a>':'—';
    h+='<tr class="ul3-row"><td class="px-4 py-3 text-sm font-bold" style="color:#4f46e5;white-space:nowrap;">'+ul3_esc(r.joNumber)+'</td>'
      +'<td class="px-4 py-3 text-sm font-bold" style="color:#7c3aed;white-space:nowrap;">'+ul3_esc(r.rollId)+'</td>'
      +'<td class="px-4 py-3 text-sm">'+(r.widthUsed?r.widthUsed+' ft':'—')+'</td>'
      +'<td class="px-4 py-3 text-sm font-bold">'+r.lengthUsed+' ft</td>'
      +'<td class="px-4 py-3 text-xs" style="color:#374151;">'+ul3_esc(r.operator)+'</td>'
      +'<td class="px-4 py-3 text-xs" style="color:#9ca3af;white-space:nowrap;">'+ul3_esc(r.dateUsed)+'</td>'
      +'<td class="px-4 py-3">'+pl+'</td></tr>';
  });
  tb.innerHTML=h;
}
function ul3_renderCards(data){
  var el=document.getElementById('ul3-cards');
  if(!data.length){el.innerHTML='<div class="bg-white rounded-xl border border-gray-200 px-4 py-8 text-center text-sm" style="color:#9ca3af;">No entries.</div>';return;}
  var h='';
  data.forEach(function(r){
    h+='<div class="bg-white rounded-xl border border-gray-200 px-4 py-4 space-y-2">'
      +'<div class="flex justify-between"><span class="text-sm font-bold" style="color:#4f46e5;">'+ul3_esc(r.joNumber)+'</span><span class="text-xs" style="color:#9ca3af;">'+ul3_esc(r.dateUsed)+'</span></div>'
      +'<p class="text-sm font-semibold" style="color:#7c3aed;">'+ul3_esc(r.rollId)+'</p>'
      +'<div class="flex gap-3 text-sm"><span>Used: <strong>'+r.lengthUsed+' ft</strong></span>'+(r.widthUsed?'<span>Width: <strong>'+r.widthUsed+' ft</strong></span>':'')+'</div>'
      +'<p class="text-xs" style="color:#9ca3af;">'+ul3_esc(r.operator)+'</p>'
      +(r.plottingLink?'<a href="'+ul3_esc(r.plottingLink)+'" target="_blank" class="text-xs font-semibold" style="color:#7c3aed;">📊 View Plotting Sheet</a>':'')
      +'</div>';
  });
  el.innerHTML=h;
}
function ul3_err(m){document.getElementById('ul3-tableWrap').style.display='block';document.getElementById('ul3-tbody').innerHTML='<tr><td colspan="7" class="px-5 py-12 text-center text-sm" style="color:#ef4444;">'+ul3_esc(m)+'</td></tr>';}
function ul3_esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
</script>
