<!-- RollStockIn.html v4 — unified design + reload -->
<style>
  #tab-stock-in, #tab-stock-in * { color: var(--p-text); }
  #tab-stock-in .text-white * { color: #fff; }

  .si4-mat-row {
    border: 1.5px solid var(--p-border); border-radius: 11px; padding: 12px 14px;
    cursor: pointer; transition: all .15s; margin-bottom: 8px; background: var(--p-surface);
  }
  .si4-mat-row:hover   { border-color: var(--p-teal-bd); background: var(--p-teal-lt); }
  .si4-mat-row.selected { border-color: var(--p-teal); background: var(--p-teal-lt); }
</style>

<div style="padding:20px 20px 40px;max-width:640px;">

  <!-- Header -->
  <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:20px;">
    <div>
      <h2 style="font-size:20px;font-weight:800;letter-spacing:-.02em;margin:0 0 3px;">Stock In Rolls</h2>
      <p style="font-size:13px;color:var(--p-muted);margin:0;">Admin Team Leader — Register new roll delivery</p>
    </div>
    <button id="si4-reloadBtn" class="p-btn-reload" onclick="si4_reload()">
      <svg width="13" height="13" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5"
          d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/>
      </svg>
      Reload
    </button>
  </div>

  <!-- Access warning -->
  <div id="si4-access" style="display:none;margin-bottom:14px;" class="p-alert p-alert-warn">
    <svg width="15" height="15" fill="none" stroke="currentColor" viewBox="0 0 24 24" style="flex-shrink:0;margin-top:1px;">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/>
    </svg>
    Only Admin Team Leaders can stock in rolls.
  </div>

  <!-- Step 1: Select material -->
  <div class="p-card" style="padding:18px;margin-bottom:14px;">
    <p class="p-section-title">Step 1 — Select Material</p>
    <div class="p-search-wrap" style="margin-bottom:12px;">
      <span class="icon">
        <svg width="14" height="14" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-4.35-4.35M17 11A6 6 0 1 1 5 11a6 6 0 0 1 12 0z"/>
        </svg>
      </span>
      <input type="text" id="si4-matSearch" class="p-input" placeholder="Search material code or name…" oninput="si4_filterMats()">
    </div>
    <div id="si4-matList" style="max-height:220px;overflow-y:auto;">
      <div style="text-align:center;padding:24px;font-size:13px;color:var(--p-faint);">Loading materials…</div>
    </div>
  </div>

  <!-- Selected material info -->
  <div id="si4-selCard" style="display:none;margin-bottom:14px;" class="p-alert p-alert-info">
    <svg width="15" height="15" fill="none" stroke="currentColor" viewBox="0 0 24 24" style="flex-shrink:0;margin-top:1px;">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/>
    </svg>
    <div id="si4-selBody" style="flex:1;font-size:12px;line-height:1.8;"></div>
  </div>

  <!-- Step 2: Qty + refs -->
  <div class="p-card" id="si4-qtySection" style="display:none;padding:18px;margin-bottom:14px;">
    <p class="p-section-title">Step 2 — Delivery Details</p>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px;">
      <div>
        <label class="p-label">Number of Rolls <span style="color:var(--p-red);">*</span></label>
        <input type="number" id="si4-qty" class="p-input" min="1" max="50" step="1" value="1" oninput="si4_updatePreview()">
      </div>
      <div>
        <label class="p-label">DR / Batch Reference</label>
        <input type="text" id="si4-batchRef" class="p-input" placeholder="e.g. DR-2026-001">
      </div>
    </div>
    <div>
      <label class="p-label">Notes (optional)</label>
      <input type="text" id="si4-notes" class="p-input" placeholder="Any notes about this delivery…">
    </div>
  </div>

  <!-- Preview -->
  <div id="si4-preview" style="display:none;margin-bottom:14px;" class="p-alert p-alert-success">
    <svg width="15" height="15" fill="none" stroke="currentColor" viewBox="0 0 24 24" style="flex-shrink:0;margin-top:1px;">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"/>
    </svg>
    <div id="si4-prevBody" style="flex:1;font-size:12px;line-height:1.8;"></div>
  </div>

  <!-- Submit -->
  <button id="si4-btn" onclick="si4_submit()" disabled class="p-btn" style="width:100%;padding:14px;font-size:14px;background:#9ca3af;color:#fff;cursor:not-allowed;">
    Stock In Rolls
  </button>
  <p style="text-align:center;font-size:11px;color:var(--p-faint);margin-top:8px;">Roll IDs are auto-generated (e.g. MOD001-R01, MOD001-R02…)</p>

  <!-- Result -->
  <div id="si4-result" style="display:none;margin-top:12px;"></div>

</div>

<script>
var si4_mats = [], si4_selMat = null, si4_lastBatch = null;

function prism_init_stock_in() {
  si4_loadMats();
  google.script.run
    .withSuccessHandler(function(u) {
      var role = (u.role || '').toLowerCase();
      var ok = role.includes('admin') || role.includes('admin team leader') || role.includes('admin tl');
      if (!ok) {
        document.getElementById('si4-access').style.display = 'flex';
        document.getElementById('si4-matList').style.opacity = '.4';
        document.getElementById('si4-matList').style.pointerEvents = 'none';
      }
    })
    .withFailureHandler(function() {})
    .prism_getUserInfoPublic();
}

function si4_reload() {
  prism_setReloading('si4-reloadBtn', true);
  si4_loadMats();
}

function si4_loadMats() {
  google.script.run
    .withSuccessHandler(function(r) {
      prism_setReloading('si4-reloadBtn', false);
      if (r && r.success) {
        si4_mats = r.data || [];
        si4_renderMats(si4_mats);
      } else {
        document.getElementById('si4-matList').innerHTML =
          '<div style="text-align:center;padding:20px;font-size:13px;color:var(--p-red);">' + si4_esc((r && r.message) || 'Failed to load.') + '</div>';
      }
    })
    .withFailureHandler(function(e) {
      prism_setReloading('si4-reloadBtn', false);
      document.getElementById('si4-matList').innerHTML =
        '<div style="text-align:center;padding:20px;font-size:13px;color:var(--p-red);">' + si4_esc(e.message) + '</div>';
    })
    .prism_getAllMaterialsPublic();
}

function si4_filterMats() {
  var q = (document.getElementById('si4-matSearch').value || '').trim().toLowerCase();
  si4_renderMats(si4_mats.filter(function(m) { return !q || (m.materialCode + ' ' + m.materialName).toLowerCase().indexOf(q) !== -1; }));
}

function si4_renderMats(mats) {
  var el = document.getElementById('si4-matList');
  if (!mats.length) {
    el.innerHTML = '<div style="text-align:center;padding:20px;font-size:13px;color:var(--p-faint);">No materials found. Add materials in the Materials tab first.</div>';
    return;
  }
  var h = '';
  mats.forEach(function(m) {
    var sel = si4_selMat && si4_selMat.materialCode === m.materialCode ? ' selected' : '';
    h += '<div class="si4-mat-row' + sel + '" onclick="si4_selectMat(\'' + si4_esc(m.materialCode).replace(/'/g,"\\'") + '\')">'
      + '<div style="display:flex;align-items:center;justify-content:space-between;gap:8px;">'
      + '<span class="mono" style="font-weight:700;font-size:13px;color:var(--p-teal);">' + si4_esc(m.materialCode) + '</span>'
      + '<span class="p-badge badge-teal">' + m.width + ' ft × ' + m.standardLength + ' ft</span>'
      + '</div>'
      + '<p style="font-size:12px;color:var(--p-muted);margin:3px 0 0;">' + si4_esc(m.materialName) + '</p>'
      + '</div>';
  });
  el.innerHTML = h;
}

function si4_selectMat(code) {
  for (var i = 0; i < si4_mats.length; i++) { if (si4_mats[i].materialCode === code) { si4_selMat = si4_mats[i]; break; } }
  si4_filterMats();
  var card = document.getElementById('si4-selCard');
  card.style.display = 'flex';
  document.getElementById('si4-selBody').innerHTML =
    '<strong>Selected:</strong> <span class="mono">' + si4_esc(si4_selMat.materialCode) + '</span> — ' + si4_esc(si4_selMat.materialName)
    + ' &nbsp;·&nbsp; ' + si4_selMat.width + ' ft × ' + si4_selMat.standardLength + ' ft'
    + (si4_selMat.costPerRoll ? ' &nbsp;·&nbsp; ₱' + Number(si4_selMat.costPerRoll).toLocaleString() + '/roll' : '');
  document.getElementById('si4-qtySection').style.display = 'block';
  si4_updatePreview();
}

function si4_updatePreview() {
  if (!si4_selMat) return;
  var qty = parseInt(document.getElementById('si4-qty').value) || 0;
  var valid = qty >= 1;
  var btn = document.getElementById('si4-btn');
  btn.disabled = !valid;
  btn.style.background = valid ? 'var(--p-teal)' : '#9ca3af';
  btn.style.cursor = valid ? 'pointer' : 'not-allowed';
  var prev = document.getElementById('si4-preview');
  if (!valid) { prev.style.display = 'none'; return; }
  prev.style.display = 'flex';
  document.getElementById('si4-prevBody').innerHTML =
    '<strong>' + qty + ' roll' + (qty > 1 ? 's' : '') + '</strong> of <span class="mono">' + si4_esc(si4_selMat.materialCode) + '</span>'
    + ' (' + si4_selMat.width + ' ft × ' + si4_selMat.standardLength + ' ft each)'
    + ' — Roll IDs will be auto-generated on submit.';
}

function si4_submit() {
  if (!si4_selMat) { prism_toast('error', 'Select a material first.'); return; }
  var qty = parseInt(document.getElementById('si4-qty').value) || 0;
  if (qty < 1) { prism_toast('error', 'Quantity must be at least 1.'); return; }
  var btn = document.getElementById('si4-btn');
  btn.disabled = true; btn.textContent = 'Stocking In…';
  google.script.run
    .withSuccessHandler(function(r) {
      btn.disabled = false; btn.textContent = 'Stock In Rolls'; si4_updatePreview();
      var res = document.getElementById('si4-result');
      res.style.display = 'block';
      if (r.success) {
        var rollIds   = r.rollIds || [];
        var matCode   = r.materialCode   || '';
        var matName   = r.materialName   || '';
        var matWidth  = r.width          || '';
        var matLength = r.originalLength || '';

        res.style.cssText = 'display:block;background:var(--p-green-lt);border:1.5px solid var(--p-green-bd);border-radius:12px;padding:16px;';
        res.innerHTML =
          '<div style="display:flex;align-items:flex-start;gap:10px;margin-bottom:14px;">'
          + '<svg width="16" height="16" fill="none" stroke="var(--p-green)" viewBox="0 0 24 24" style="flex-shrink:0;margin-top:2px;"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M5 13l4 4L19 7"/></svg>'
          + '<div><p style="font-weight:800;font-size:14px;color:var(--p-green);margin:0 0 3px;">' + si4_esc(r.message) + '</p>'
          + '<p style="font-size:12px;color:var(--p-muted);margin:0;">IDs: <span class="mono" style="color:var(--p-text);">' + rollIds.join(', ') + '</span></p></div>'
          + '</div>'
          + '<button onclick="si4_printLabels(si4_lastBatch)"'
          + ' class="p-btn p-btn-green" style="width:100%;padding:12px;font-size:13px;gap:8px;">'
          + '<svg width="14" height="14" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 17h2a2 2 0 002-2v-4a2 2 0 00-2-2H5a2 2 0 00-2 2v4a2 2 0 002 2h2m2 4h6a2 2 0 002-2v-4a2 2 0 00-2-2H9a2 2 0 00-2 2v4a2 2 0 002 2zm8-12V5a2 2 0 00-2-2H9a2 2 0 00-2 2v4h10z"/></svg>'
          + '\u{1F5A8} Print Roll Labels (' + rollIds.length + ' label' + (rollIds.length !== 1 ? 's' : '') + ')'
          + '</button>';

        // Store batch data for print function
        si4_lastBatch = {
          rollIds:   rollIds,
          matCode:   matCode,
          matName:   matName,
          matWidth:  matWidth,
          matLength: matLength,
          date:      new Date().toLocaleDateString('en-PH', {year:'numeric',month:'short',day:'numeric'})
        };

        prism_toast('success', r.message);
        si4_selMat = null;
        ['si4-selCard','si4-qtySection','si4-preview'].forEach(function(id) { document.getElementById(id).style.display = 'none'; });
        document.getElementById('si4-matSearch').value = '';
        document.getElementById('si4-qty').value = '1';
        document.getElementById('si4-batchRef').value = '';
        document.getElementById('si4-notes').value = '';
        si4_renderMats(si4_mats);
        btn.disabled = true; btn.style.background = '#9ca3af'; btn.style.cursor = 'not-allowed';
      } else {
        res.className = 'p-alert p-alert-error';
        res.innerHTML = '<svg width="15" height="15" fill="none" stroke="currentColor" viewBox="0 0 24 24" style="flex-shrink:0;"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg><span>' + si4_esc(r.message) + '</span>';
        prism_toast('error', r.message);
      }
    })
    .withFailureHandler(function(e) { btn.disabled = false; btn.textContent = 'Stock In Rolls'; si4_updatePreview(); prism_toast('error', e.message); })
    .prism_stockIn({ materialCode: si4_selMat.materialCode, width: si4_selMat.width, originalLength: si4_selMat.standardLength, qty: qty,
      batchRef: document.getElementById('si4-batchRef').value.trim(), notes: document.getElementById('si4-notes').value.trim() });
}


/* ── Print Roll Labels ── */
function si4_printLabels(batch) {
  if (!batch || !batch.rollIds || !batch.rollIds.length) {
    prism_toast('error', 'No roll IDs to print.'); return;
  }

  var today    = batch.date || new Date().toLocaleDateString();
  var matCode  = batch.matCode  || '';
  var matName  = batch.matName  || '';
  var matWidth = batch.matWidth || '';
  var matLen   = batch.matLength|| '';
  var dim      = (matWidth && matLen) ? matWidth + ' ft × ' + matLen + ' ft' : '';

  // Build one label per roll ID
  var labelsHtml = batch.rollIds.map(function(id) {
    return [
      '<div class="label">',
        '<div class="label-top">',
          '<span class="label-brand">PRISM</span>',
          '<span class="label-status">UNOPENED</span>',
        '</div>',
        '<div class="label-id">' + id + '</div>',
        '<div class="label-mat">' + matName + '</div>',
        '<div class="label-dim">' + dim + '</div>',
        '<div class="label-date">Rcvd: ' + today + '</div>',
        '<div class="label-barcode">' + id.replace(/-/g, ' ― ') + '</div>',
      '</div>'
    ].join('');
  }).join('');

  var html = [
    '<!DOCTYPE html><html><head>',
    '<meta charset="UTF-8">',
    '<title>PRISM Roll Labels — ' + matCode + '</title>',
    '<style>',
      '@page { size: A4; margin: 10mm; }',
      'body { font-family: "Segoe UI", system-ui, sans-serif; background:#fff; margin:0; padding:0; -webkit-print-color-adjust:exact; print-color-adjust:exact; }',
      '.page-header { display:flex; align-items:center; justify-content:space-between; padding:0 0 10px; border-bottom:2px solid #15803d; margin-bottom:14px; }',
      '.page-header h1 { font-size:15px; font-weight:800; color:#15803d; margin:0; }',
      '.page-header p  { font-size:11px; color:#6b7280; margin:0; text-align:right; }',
      '.grid { display:grid; grid-template-columns: repeat(3, 1fr); gap:8px; }',
      '.label {',
        'border:1.5px solid #15803d; border-radius:8px; padding:10px 12px;',
        'background:#fff; page-break-inside:avoid; break-inside:avoid;',
        'box-shadow:inset 0 0 0 3px #f0fdf4;',
      '}',
      '.label-top { display:flex; align-items:center; justify-content:space-between; margin-bottom:6px; }',
      '.label-brand { font-size:9px; font-weight:900; letter-spacing:.1em; color:#0d9488; text-transform:uppercase; }',
      '.label-status { font-size:8px; font-weight:800; background:#f0fdf4; color:#15803d; border:1px solid #86efac; border-radius:4px; padding:1px 6px; letter-spacing:.04em; }',
      '.label-id { font-family:monospace; font-size:17px; font-weight:900; color:#111827; letter-spacing:.04em; margin-bottom:4px; line-height:1.1; }',
      '.label-mat { font-size:9px; font-weight:600; color:#374151; margin-bottom:2px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }',
      '.label-dim { font-size:10px; font-weight:800; color:#0d9488; margin-bottom:3px; }',
      '.label-date { font-size:8px; color:#9ca3af; margin-bottom:5px; }',
      '.label-barcode { font-family:monospace; font-size:7px; color:#d1d5db; letter-spacing:.06em; border-top:1px dashed #e5e7eb; padding-top:4px; margin-top:2px; text-align:center; }',
      '.cut-hint { font-size:9px; color:#9ca3af; text-align:center; margin-top:12px; padding-top:8px; border-top:1px dashed #e5e7eb; }',
      '@media print {',
        '.no-print { display:none !important; }',
        'body { padding:0; }',
      '}',
    '</style>',
    '</head><body>',
    '<div class="no-print" style="background:#f0fdf4;border:1px solid #86efac;border-radius:8px;padding:12px 16px;margin-bottom:16px;display:flex;align-items:center;justify-content:space-between;">',
      '<div>',
        '<strong style="color:#15803d;font-size:14px;">Roll Labels Ready to Print</strong>',
        '<p style="font-size:12px;color:#374151;margin:3px 0 0;">' + batch.rollIds.length + ' labels — ' + matCode + ' ' + dim + '</p>',
      '</div>',
      '<div style="display:flex;gap:8px;">',
        '<button onclick="window.print()" style="background:#15803d;color:#fff;border:none;border-radius:8px;padding:9px 18px;font-size:13px;font-weight:700;cursor:pointer;">&#128438; Print</button>',
        '<button onclick="window.close()" style="background:#f3f4f6;color:#374151;border:1px solid #d1d5db;border-radius:8px;padding:9px 14px;font-size:13px;font-weight:600;cursor:pointer;">Close</button>',
      '</div>',
    '</div>',
    '<div class="page-header">',
      '<h1>&#127807; PRISM — Roll Labels</h1>',
      '<p>' + matCode + ' — ' + matName + '<br>Printed: ' + today + '</p>',
    '</div>',
    '<div class="grid">',
    labelsHtml,
    '</div>',
    '<p class="cut-hint">&#9986; Cut along label borders and affix to each roll. All rolls status: UNOPENED.</p>',
    '</body></html>'
  ].join('');

  var win = window.open('', '_blank', 'width=900,height=700');
  if (!win) { prism_toast('error', 'Pop-up blocked. Please allow pop-ups for this site.'); return; }
  win.document.write(html);
  win.document.close();
  // Auto-trigger print dialog after a short delay
  win.onload = function() { setTimeout(function() { win.print(); }, 400); };
}

function si4_esc(s) { return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
</script>
